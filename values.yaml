# --- Dependency ----------------------------------------------------------------
oauth2-proxy:
  enabled: false
  priorityClassName: system-cluster-critical
  config:
    # OAuth Client ID and Client Secret issued by the identity provider (e.g., Dex, Keycloak, Google)
    clientID: "clientid"
    clientSecret: "clientsecret"
    # Secret used to encrypt cookies. Must be a cryptographically strong value
    # Create a new secret with the following command
    # openssl rand -base64 32 | head -c 32 | base64
    cookieSecret: "Vy81NjF6ckxNeE5IVnFuMjFwbEl4dW9YUy8wQ2tUWVQ="

  extraArgs:
    # Authentication provider type (e.g., oidc, google, github)
    provider: oidc

    # Display name shown on the login page for the provider
    provider-display-name: Dex

    # The backend application to proxy to after authentication
    # Replace SVC and PORT with your internal Kubernetes service and port
    upstream: "http://incloud-web-incloud-web-chart"

    # Callback URL where the identity provider redirects after login
    # Must match the redirect URI configured in your IDP
    redirect-url: "http://incloud-web-incloud-web-chart/oauth2/callback"

    # Root URL of the OIDC identity provider (issuer)
    # Should point to your IDP (e.g., Dex, Keycloak, Auth0)
    oidc-issuer-url: "http://incloud-web-incloud-web-chart/dex"

    # Restrict login to specific email domains. Use "*" to allow all domains
    # Example: "example.com" only allows users with @example.com
    email-domain: "*"

    # Forward the OAuth access token to the upstream application
    # Passed in the 'X-Forwarded-Access-Token' header
    pass-access-token: true

    # Forward the Authorization header (e.g., Bearer token) to the upstream
    # Useful if the backend application validates the token itself
    pass-authorization-header: true

    # How often to refresh the session cookie and revalidate the user
    # Helps maintain active sessions without forcing re-login
    cookie-refresh: 1h

    # Name of the cookie used to store the authentication session
    # Should be unique if multiple apps use the same domain
    cookie-name: incloud

    # Set the Secure flag on cookies — only send over HTTPS
    # Should be true in production environments
    cookie-secure: false

    # Skip SSL/TLS certificate verification when connecting to the upstream provider or OIDC issuer
    # WARNING: This disables security checks for HTTPS connections and accepts any certificate, including invalid or self-signed ones
    # Only use in trusted development or testing environments — NEVER in production
    # Default: false (recommended for secure deployments)
    ssl-insecure-skip-verify: true

    # Scopes requested from the identity provider
    # Customize if you need specific claims (e.g., groups)
    scope: "openid email profile groups offline_access"

    # Skip showing the provider login button; redirect directly to IDP
    # Enables seamless single sign-on experience
    skip-provider-button: true

    # OIDC prompt parameter. 'none' avoids login screen if session exists
    # Enables silent authentication when possible
    prompt: none

    # URL prefix for oauth2-proxy endpoints (e.g., /oauth2/callback, /oauth2/sign_in)
    proxy-prefix: /oauth2

    # tls-cert-file: /etc/ssl/tls/tls.crt
    # tls-key-file: /etc/ssl/tls/tls.key

  extraVolumes: []
    # - name: internal-cert
    #   secret:
    #     defaultMode: 420
    #     secretName: incloud-web-cert-internal-tls

  extraVolumeMounts: []
    # - mountPath: /etc/ssl/tls
    #   name: internal-cert

  httpScheme: http
  service:
    portNumber: 4080

dex:
  enabled: false

  config:
    issuer: http://incloud-web-incloud-web-chart/dex

    frontend:
      issuerUrl: http://incloud-web-incloud-web-chart/dex
      theme: "coreos"
      issuer: "InCloud"

    storage:
      type: kubernetes
      config:
        inCluster: true

    # web:
    #   tlsCert: /etc/dex/tls/tls.crt
    #   tlsKey: /etc/dex/tls/tls.key

    expiry:
      signingKeys: "6h"
      idTokens: "24h"

    logger:
      level: debug
      format: json

    oauth2:
      passwordConnector: local

    enablePasswordDB: True

    staticClients:
      - id: "clientid"
        name: "clientid"
        secret: "clientsecret"
        redirectURIs:
          - "http://incloud-web-incloud-web-chart/oauth2/callback"

    # u: admin@example.com
    # p: admin
    staticPasswords:
      - email: "admin@example.com"
        # bcrypt hash of the string "admin": $(echo admin | htpasswd -BinC 10 admin | cut -d: -f2)
        hash: "$2y$10$OFnA7tTUKalTsIiIWzPSp.XE4MhyGSoYh8pzUYSBsuJnN2pcuM7wG"
        username: "admin"
        userID: "08a8684b-db88-4b73-90a9-3cd1661f5466"
  # https:
  #   enabled: true

  service:
    ports:
      http:
        port: 5556
      https:
        port: 5554

  volumes: []
    # - name: internal-cert
    #   secret:
    #     defaultMode: 420
    #     secretName: incloud-web-cert-internal-tls

  volumeMounts: []
    # - mountPath: /etc/dex/tls
    #   name: internal-cert

# --- Cluster ---------------------------------------------------------------
# Static cluster list served as JSON by the nginx sidecar at /clusterlist and /api/clusters.
# Each entry generates a proxy location in the nginx config: /api/clusters/<name> → <scheme>://<api>.
# The UI reads this list on startup to populate the cluster selector dropdown.
clusters:
  - name: default          # Unique cluster identifier (used in URLs and proxy routing)
    description: default   # Human-readable description shown in the cluster list UI
    tenant: dev            # Tenant label associated with this cluster
    scheme: http           # Protocol for proxying to the cluster API (http or https)
    api: 127.0.0.1         # Kubernetes API server address for this cluster

# --- Default Web Resources ---------------------------------------------------------------
# Toggle the built-in Breadcrumb, CCO (CustomColumnsOverride), and Factory CRs
# that ship with this chart. Set a key to "false" to skip rendering that resource.
# Useful when you define your own CRs or manage them externally.
defaultWebResources:

  # Breadcrumb CRs rendered by templates/breadcrumbs/.
  # Key pattern: "stock-<scope>-factory-<factory-name>"
  #   scope: "cluster" (cluster-scoped view) or "project" (namespaced view)
  #   factory-name: corresponds to the Factory CR name these breadcrumbs belong to.
  breadcrumbs:
    default:
      stock-cluster-factory-namespace-details: true                    # breadcrumbs for the namespace detail page (cluster scope)
      stock-cluster-factory-base-factory-clusterscoped-api: true       # breadcrumbs for cluster-scoped API resource detail pages
      stock-cluster-factory-base-factory-clusterscoped-builtin: true   # breadcrumbs for cluster-scoped builtin (core/v1) detail pages
      stock-project-factory-base-factory-namespaced-api: true          # breadcrumbs for namespaced API resource detail pages
      stock-project-factory-base-factory-namespaced-builtin: true      # breadcrumbs for namespaced builtin (core/v1) detail pages

  # CustomColumnsOverride CRs for namespace list tables.
  # Key: CCO resource name (matches spec.id and metadata.name).
  customcolumnsoverride:
    stock-cluster-v1_namespaces: true     # columns for namespace list in cluster-scoped view
    stock-namespace-v1_namespaces: true   # columns for namespace list in namespaced view

  # Factory CRs — base detail pages for resources.
  # Key: Factory CR name (matches spec.key and metadata.name).
  factory:
    default:
      base-factory-clusterscoped-api: true       # generic detail page for any cluster-scoped API resource
      base-factory-clusterscoped-builtin: true   # generic detail page for any cluster-scoped core/v1 resource
      base-factory-namespaced-api: true          # generic detail page for any namespaced API resource
      base-factory-namespaced-builtin: true      # generic detail page for any namespaced core/v1 resource
      namespace-details: true                    # detail page for Namespace resources

customWebResources:
  # Per-resource overrides for built-in CRs. When a key is absent the resource is
  # enabled by default. Add a key with "enabled: false" to disable a specific CR,
  # or add feature flags consumed by the corresponding template.

  # CustomColumnsOverride overrides. Key = CCO resource name (e.g., "stock-cluster-v1.services").
  # customcolumnsoverride:
  #   stock-cluster-v1.services:
  #     enabled: false         # disables the built-in CCO for cluster-scoped Services table
  customcolumnsoverride: {}

  # Navigation CR overrides. Key = Navigation resource name.
  # navigation:
  #   navigation:
  #     enabled: false         # disables the primary Navigation CR
  navigation: {}

  # Factory CR overrides. Key = Factory resource name (spec.key / metadata.name).
  # Besides "enabled", templates may read additional flags from this config block.
  factory:
    pod-details:
      enabled: true
      enableMonitoringTab: true            # renders the Monitoring tab with Grafana iframe on the Pod detail page
    node-details:
      enabled: true
      enableConfigReportsAquaTab: true     # renders the Aqua Security config audit reports tab on the Node detail page


# --- Navigation (Navigation CR: front.in-cloud.io/v1alpha1) ----------------
# Configures context-switching behavior in the UI header selectors
# (cluster, instance, namespace, project) and maps base factory identifiers
# to detail-page Factory CR names. The openapi-ui app reads this CR to know
# where to navigate when a user changes context or opens a resource detail page.
navigation:
  # Name of the Navigation custom resource to create.
  name: navigation

  # Enable or disable rendering of the baseFactoriesMapping block in the CR.
  baseFactoriesMappingEnabled: true

  # Maps base factory identifiers → detail-page Factory CR names.
  # Key pattern: "<base-factory-key>-<apiGroup>-<apiVersion>-<plural>"
  #   where <base-factory-key> is one of:
  #     base-factory-clusterscoped-api    — cluster-scoped API resources (apps, batch, networking, etc.)
  #     base-factory-clusterscoped-builtin — cluster-scoped core/v1 resources (pods, services, etc.)
  #     base-factory-namespaced-api       — same as above but within namespace context
  #     base-factory-namespaced-builtin   — same as above but within namespace context
  # Value: Factory CR name that renders the detail page (e.g., "deployment-details").
  # The UI resolves which Factory to load when navigating from a table row to a detail view.
  baseFactoriesMapping:
    base-factory-clusterscoped-api-apiextensions.k8s.io-v1-customresourcedefinitions: crd-details
    base-factory-clusterscoped-api-apps-v1-daemonsets: daemonset-details
    base-factory-clusterscoped-api-apps-v1-deployments: deployment-details
    base-factory-clusterscoped-api-apps-v1-instance-daemonsets: instance-daemonset-details
    base-factory-clusterscoped-api-apps-v1-instance-deployments: instance-deployment-details
    base-factory-clusterscoped-api-apps-v1-instance-replicasets: instance-replicaset-details
    base-factory-clusterscoped-api-apps-v1-instance-statefulsets: instance-statefulset-details
    base-factory-clusterscoped-api-apps-v1-replicasets: replicaset-details
    base-factory-clusterscoped-api-apps-v1-statefulsets: statefulset-details
    base-factory-clusterscoped-api-autoscaling-v2-horizontalpodautoscalers: horizontalpodautoscaler-details
    base-factory-clusterscoped-api-autoscaling-v2-instance-horizontalpodautoscalers: instance-horizontalpodautoscaler-details
    base-factory-clusterscoped-api-batch-v1-cronjobs: cronjob-details
    base-factory-clusterscoped-api-batch-v1-instance-cronjobs: instance-cronjob-details
    base-factory-clusterscoped-api-batch-v1-instance-jobs: instance-job-details
    base-factory-clusterscoped-api-batch-v1-jobs: job-details
    base-factory-clusterscoped-api-cert-manager.io-v1-certificates: certificate-details
    base-factory-clusterscoped-api-networking.k8s.io-v1-instance-networkpolicies: instance-networkpolicy-details
    base-factory-clusterscoped-api-networking.k8s.io-v1-networkpolicies: networkpolicy-details
    base-factory-clusterscoped-api-policy-v1-instance-poddisruptionbudgets: instance-poddisruptionbudget-details
    base-factory-clusterscoped-api-policy-v1-poddisruptionbudgets: poddisruptionbudget-details
    base-factory-clusterscoped-api-rbac.authorization.k8s.io-v1-clusterrolebindings: clusterrolebinding-details
    base-factory-clusterscoped-api-rbac.authorization.k8s.io-v1-clusterroles: clusterrole-details
    base-factory-clusterscoped-api-rbac.authorization.k8s.io-v1-rolebindings: rolebinding-details
    base-factory-clusterscoped-api-rbac.authorization.k8s.io-v1-roles: role-details
    base-factory-clusterscoped-builtin-v1-configmaps: configmap-details
    base-factory-clusterscoped-builtin-v1-instance-configmaps: instance-configmap-details
    base-factory-clusterscoped-builtin-v1-instance-pods: instance-pod-details
    base-factory-clusterscoped-builtin-v1-instance-replicationcontrollers: instance-replicationcontroller-details
    base-factory-clusterscoped-builtin-v1-instance-secrets: instance-secret-details
    base-factory-clusterscoped-builtin-v1-instance-serviceaccounts: instance-serviceaccount-details
    base-factory-clusterscoped-builtin-v1-instance-services: instance-service-details
    base-factory-clusterscoped-builtin-v1-nodes: node-details
    base-factory-clusterscoped-builtin-v1-pods: pod-details
    base-factory-clusterscoped-builtin-v1-replicationcontrollers: replicationcontroller-details
    base-factory-clusterscoped-builtin-v1-secrets: secret-details
    base-factory-clusterscoped-builtin-v1-serviceaccounts: serviceaccount-details
    base-factory-clusterscoped-builtin-v1-services: service-details
    base-factory-namespaced-api-apiextensions.k8s.io-v1-customresourcedefinitions: crd-details
    base-factory-namespaced-api-apps-v1-daemonsets: daemonset-details
    base-factory-namespaced-api-apps-v1-deployments: deployment-details
    base-factory-namespaced-api-apps-v1-instance-daemonsets: instance-daemonset-details
    base-factory-namespaced-api-apps-v1-instance-deployments: instance-deployment-details
    base-factory-namespaced-api-apps-v1-instance-replicasets: instance-replicaset-details
    base-factory-namespaced-api-apps-v1-instance-statefulsets: instance-statefulset-details
    base-factory-namespaced-api-apps-v1-replicasets: replicaset-details
    base-factory-namespaced-api-apps-v1-statefulsets: statefulset-details
    base-factory-namespaced-api-argoproj.io-v1alpha1-applications: argocd-application-details
    base-factory-namespaced-api-argoproj.io-v1alpha1-appprojects: argocd-appproject-details
    base-factory-namespaced-api-autoscaling-v2-horizontalpodautoscalers: horizontalpodautoscaler-details
    base-factory-namespaced-api-autoscaling-v2-instance-horizontalpodautoscalers: instance-horizontalpodautoscaler-details
    base-factory-namespaced-api-batch-v1-cronjobs: cronjob-details
    base-factory-namespaced-api-batch-v1-instance-cronjobs: instance-cronjob-details
    base-factory-namespaced-api-batch-v1-instance-jobs: instance-job-details
    base-factory-namespaced-api-batch-v1-jobs: job-details
    base-factory-namespaced-api-cert-manager.io-v1-certificates: certificate-details
    base-factory-namespaced-api-networking.k8s.io-v1-instance-networkpolicies: instance-networkpolicy-details
    base-factory-namespaced-api-networking.k8s.io-v1-networkpolicies: networkpolicy-details
    base-factory-namespaced-api-policy-v1-instance-poddisruptionbudgets: instance-poddisruptionbudget-details
    base-factory-namespaced-api-policy-v1-poddisruptionbudgets: poddisruptionbudget-details
    base-factory-namespaced-api-rbac.authorization.k8s.io-v1-clusterrolebindings: clusterrolebinding-details
    base-factory-namespaced-api-rbac.authorization.k8s.io-v1-clusterroles: clusterrole-details
    base-factory-namespaced-api-rbac.authorization.k8s.io-v1-rolebindings: rolebinding-details
    base-factory-namespaced-api-rbac.authorization.k8s.io-v1-roles: role-details
    base-factory-namespaced-builtin-v1-configmaps: configmap-details
    base-factory-namespaced-builtin-v1-instance-configmaps: instance-configmap-details
    base-factory-namespaced-builtin-v1-instance-pods: instance-pod-details
    base-factory-namespaced-builtin-v1-instance-replicationcontrollers: instance-replicationcontroller-details
    base-factory-namespaced-builtin-v1-instance-secrets: instance-secret-details
    base-factory-namespaced-builtin-v1-instance-serviceaccounts: instance-serviceaccount-details
    base-factory-namespaced-builtin-v1-instance-services: instance-service-details
    base-factory-namespaced-builtin-v1-pods: pod-details
    base-factory-namespaced-builtin-v1-replicationcontrollers: replicationcontroller-details
    base-factory-namespaced-builtin-v1-secrets: secret-details
    base-factory-namespaced-builtin-v1-serviceaccounts: serviceaccount-details
    base-factory-namespaced-builtin-v1-services: service-details

  # --- Context selectors ---
  # Each selector block configures a dropdown in the UI header.
  # Supported URL placeholders:
  #   {selectedCluster} — currently selected cluster name
  #   {value}           — the value the user just selected (instance/namespace/project name)
  # JSONPath expressions for aliasPath / mapOptionsPattern:
  #   {reqsJsonPath[0]['.metadata.name']} — extract .metadata.name from the first fetched list

  # "Instance" selector — switches between instances (custom resource of the platform).
  instances:
    enabled: true
    # JSONPath to resolve the display name for the selected instance
    aliasPath: "{reqsJsonPath[0]['.metadata.name']}"
    # URL to navigate when an instance is selected
    change: "/openapi-ui/{selectedCluster}/{value}/builtin-table/pods?resources=metrics.k8s.io/v1beta1/pods"
    # URL to navigate when the instance selector is cleared
    clear: "/openapi-ui/{selectedCluster}/builtin-table/pods?resources=metrics.k8s.io/v1beta1/pods"
    # JSONPath to extract dropdown option labels from the fetched instance list
    mapOptionsPattern: "{reqsJsonPath[0]['.metadata.name']}"

  # "Namespace" selector — switches between Kubernetes namespaces.
  namespaces:
    enabled: true
    aliasPath: "{reqsJsonPath[0]['.metadata.name']}"
    # URL to navigate when a namespace is selected
    change: "/openapi-ui/{selectedCluster}/{value}/builtin-table/pods"
    # URL to navigate when the namespace selector is cleared (falls back to namespace list)
    clear: "/openapi-ui/{selectedCluster}/builtin-table/namespaces"

  # "Project" selector — switches between projects (custom resource of the platform).
  projects:
    enabled: true
    aliasPath: "{reqsJsonPath[0]['.metadata.name']}"
    change: "/openapi-ui/{selectedCluster}/{value}/builtin-table/pods?resources=metrics.k8s.io/v1beta1/pods"
    clear: "/openapi-ui/{selectedCluster}/builtin-table/pods?resources=metrics.k8s.io/v1beta1/pods"

  # URL template used when a cluster row is clicked in the Cluster CR list (uses reqsJsonPath).
  pathToNavigateFromClusterListResource: "/openapi-ui/{reqsJsonPath[0]['.metadata.name']['-']}/builtin-table/pods?resources=metrics.k8s.io/v1beta1/pods"
  # URL template used when a cluster row is clicked in the static cluster list.
  # ~recordValue~ is replaced with the cluster name at runtime.
  pathToNavigateFromClusterList: "/openapi-ui/~recordValue~/builtin-table/pods?resources=metrics.k8s.io/v1beta1/pods"

# --- Global ----------------------------------------------------------------
nameOverride: ""                  # Overrides chart name; leave empty to use default
fullnameOverride: "" # Overrides full release name; leave empty to use default

# Number of pod replicas
replicaCount: 1

# Pull secrets for private registries
imagePullSecrets: []               # e.g. [{ name: regcred }]

# Priority class for the pod
priorityClassName: system-cluster-critical

# --- ServiceAccount --------------------------------------------------------
serviceAccount:
  create: true
  name: ""                         # Defaults to <release>-<chart>
  annotations: {}

# --- RBAC ------------------------------------------------------------------
rbac:
  create: true

# --- Pod-level settings ----------------------------------------------------
podAnnotations: {}
podLabels: {}
podSecurityContext:
  enabled: true
  fsGroup: 101
  fsGroupChangePolicy: "OnRootMismatch"

# Node placement settings
nodeSelector: {}
tolerations: []
topologySpreadConstraints: []

# Networking-related pod spec
dnsPolicy: ClusterFirst
hostNetwork: false
hostPID: false
hostIPC: false
schedulerName: default-scheduler
runtimeClassName: ""
enableServiceLinks: false
preemptionPolicy: ""

# Volumes (user-defined; appended with nginx config if enabled)
volumes: []

# --- Service ---------------------------------------------------------------
service:
  enabled: true
  type: ClusterIP
  annotations: {}
  labels: {}
  ports:
    - name: web-http
      port: 8080
      targetPort: 8080
      protocol: TCP
    - name: nginx-http
      port: 8081
      targetPort: 8081
      protocol: TCP
    - name: bff-http
      port: 8082
      targetPort: 8082
      protocol: TCP

externalDomain: 127.0.0.1
externalDomainPort: 8081

expose:
  enabled: false
  # resourceType: allowed values [istio, ingress]
  resourceType: ingress

  ingress:
    annotations: {}
    labels: {}
    ingressClassName: ""

  istio:
    gateway:
      enabled: true
      name: incloud-istio-gateway
      istioLabelsSelector: {} # required value!
        # istio: istio-ingressgateway
      annotations: {}
      labels: {}
    virtualService:
      annotations: {}
      labels: {}

  # The path should end with a "/"
  path: /
  # servicePort
  # set incloud-web port
  servicePort: 80
  tls:
    # The source of the tls certificate. Set as "certmanager", "secret"
    # or "none" and fill the information in the corresponding section
    # 1) certmanager: generate the tls certificate automatically over CertManager
    # 2) secret: read the tls certificate from the specified secret.
    # The tls certificate can be generated manually or by cert manager
    # 3) none: configure no tls certificate for the ingress. If the default
    # tls certificate is configured in the ingress controller, choose this option
    certSource: none
    certmanager:
      # existingIssuer
      # if you want to use an existing issuer, you must specify:
      # kind (Issuer or ClusterIssuer) and name
      existingIssuer:
        kind: Issuer
        name: ""
    secret:
      # The name of secret which contains keys named:
      # "tls.crt" - the certificate
      # "tls.key" - the private key
      secretName: ""

# The internal TLS used for in-cloud components secure communicating. In order to enable https
# in each component tls cert files need to provided in advance.
internalTLS:
  # There are three ways to provide tls
  # 1) "certmanager" will generate cert automatically
  # 2) "secret" internal certificates from secret
  # 3) "none" no certificates
  certSource: none
  certmanager:
    # existingIssuer
    # if you want to use an existing issuer, you must specify:
    # kind (Issuer or ClusterIssuer) and name
    existingIssuer:
      kind: Issuer
      name: ""
  secret:
    # Each name of secret must contain keys named:
    # "tls.crt" - the certificate
    # "tls.key" - the private key

    # oauth2-proxy related cert configuration
    oauth2-proxy:
      # secret name for oauth2-proxy's tls certs
      secretName: ""
    # dex related cert configuration
    dex:
      # secret name for dex's tls certs
      secretName: ""

# --- Container: bff --------------------------------------------------------
bff:
  # Main toggle for enabling or disabling the BFF (Backend For Frontend) service
  enabled: true

  # Basic identification settings for the BFF container
  name: bff

  # Container image configuration
  image:
    repository: prorobotech/openapi-ui-k8s-bff
    tag: release-1.4.0-f3141e30
    pullPolicy: IfNotPresent

  # Networking configuration for the container
  containerPort: 8082
  extraContainerPorts: []

  # Environment variables that configure BFF behavior and integration with Kubernetes API
  env:
    BASE_API_GROUP: "front.in-cloud.io"
    BASE_API_VERSION: "v1alpha1"
    LOGGER: "TRUE"
    LOGGER_WITH_HEADERS: "TRUE"
    PORT: "8082"
    KUBE_API_URL: "https://kubernetes.default.svc"
    BASE_FRONTEND_PREFIX: "/openapi-ui"
    BASE_FACTORY_NAMESPACED_API_KEY: "base-factory-namespaced-api"
    BASE_FACTORY_CLUSTERSCOPED_API_KEY: "base-factory-clusterscoped-api"
    BASE_FACTORY_NAMESPACED_BUILTIN_KEY: "base-factory-namespaced-builtin"
    BASE_FACTORY_CLUSTERSCOPED_BUILTIN_KEY: "base-factory-clusterscoped-builtin"
    BASE_NAMESPACE_FACTORY_KEY: "namespace-details/v1/namespaces"
    BASE_ALLOWED_AUTH_HEADERS: user-agent,accept,content-type,origin,referer,accept-encoding,cookie
    BASE_NAVIGATION_RESOURCE_PLURAL: "navigations"
    BASE_NAVIGATION_RESOURCE_NAME: "fallback"
    WS_LOG_BLACKLIST_PATHS: '["error.config.headers.authorization","headers.authorization","headers.cookie"]'
    MF_PLUGINS_JSON: '{"plugin-rbac":{"name":"plugin-rbac","entry":"/openapi-ui-plugin-rbac/assets/remoteEntry.js","exposedModule":"./App"}}'
    # MF_PLUGINS_JSON: '{"plugin-example":{"name":"plugin-example","entry":"http://127.0.0.1:8081/openapi-ui-plugin/assets/remoteEntry.js","exposedModule":"./App"}}'

  envFrom: []

  # Resource requests and limits for CPU, memory and ephemeral storage
  resources:
    limits:
      cpu: "1"
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 128Mi
      ephemeral-storage: 50Mi

  # Security context for the container runtime
  securityContext:
    enabled: true
    allowPrivilegeEscalation: false
    capabilities:
      add:
        - CAP_CHOWN
        - CAP_NET_BIND_SERVICE
        - CAP_SETGID
        - CAP_SETUID
      drop:
        - ALL
    privileged: false
