# --- Labels/Selectors ------------------------------------------------------
selectorLabels:
  app.kubernetes.io/name: web

# --- Extra customizations --------------------------------------------------
extraPodSpec: {}
extraTemplateMetadata:
  annotations: {}
  labels: {}

extraObjects: []
# affinity: {}
podDisruptionBudget:
  minAvailable: 1

strategy:
  rollingUpdate:
    maxUnavailable: 1
    maxSurge: 1

basePrefix: openapi-ui

sidebars:
  # Cluster-level sidebar (when no namespace/project context is selected)
  # Displays global cluster resources and overview
  cluster:
    # Configuration for custom sidebar navigation items
    # customItems allows you to define additional sidebar sections with custom structure
    #
    # Each item should be structured as:
    # - key: unique-identifier     # Unique key for the sidebar section
    #   label: "Display Name"      # Display text (supports URL templating)
    #   children:                  # Optional nested items array
    #     - key: child-unique-id
    #       label: "Child Name"
    #       link: /openapi-ui/{cluster}/api-table/apiGroup/apiVersion/resourceName
    #     - key: child-unique-id
    #       label: "Child Name"
    #       link: /openapi-ui/{2}/api-table/apiGroup/apiVersion/resourceName
    # URL Templating in labels:
    # Use {n} pattern to insert URL path segments, where n is the segment index (1-based)
    # Example paths:
    # /openapi-ui/cluster-name/builtin-table/namespaces
    #   {1} = "openapi-ui", {2} = "cluster-name", {3} = "builtin-table", {4} = "namespaces"
    #   {cluster} = "cluster-name"
    customItems: []

    home:
      enabled: true
      items:
        search: true
        projects: false
        instances: false

    # Workloads management section
    workloads:
      enabled: true
      items:
        pods: true
        deployments: true
        statefulsets: true
        secrets: true
        configmaps: true
        cronjobs: true
        jobs: true
        daemonsets: true
        replicasets: true
        horizontalpodautoscalers: true  # HPA configurations
        poddisruptionbudgets: true  # PDB configurations
      extraItems: []

    # Networking resources section
    networking:
      enabled: true
      items:
        services: true
        networkpolicies: true
        ingresses: true
      extraItems: []

    # Storage resources section
    storage:
      enabled: true
      items:
        persistentvolumes: true  # Cluster-wide PVs
        persistentvolumeclaims: true  # Namespace-scoped PVCs
        storageclasses: true  # Storage classes
      extraItems: []

    # Compute resources section
    compute:
      enabled: true
      items:
        nodes: true  # Cluster nodes
      extraItems: []

    # User and access management section
    usermanagement:
      enabled: true
      items:
        rolesDiscovery: true  # Show available roles and bindings
        rolesDiscoveryGraph: true  # Show RBAC relationship graph
        serviceaccounts: true  # Namespace-scoped service accounts
        roles: true  # Namespace-scoped roles
        rolebindings: true  # Namespace-scoped role bindings
        clusterroles: true  # Cluster-wide roles
        clusterrolebindings: true  # Cluster-wide role bindings
      extraItems: []

    # Cluster administration section
    administration:
      enabled: true
      items:
        namespaces: true  # Namespace management
        limitranges: true  # Resource limits
        resourcequotas: true  # Resource quotas
        customresourcedefinitions: true  # CRD management
      extraItems: []

  # Namespaced-level sidebar (when namespace or project context is selected)
  # Displays resources scoped to the selected namespace/project
  namespaced:
    # Configuration for custom sidebar navigation items
    # customItems allows you to define additional sidebar sections with custom structure
    #
    # Each item should be structured as:
    # - key: unique-identifier     # Unique key for the sidebar section
    #   label: "Display Name"      # Display text (supports URL templating)
    #   children:                  # Optional nested items array
    #     - key: child-unique-id
    #       label: "Child Name"
    #       link: /openapi-ui/{cluster}/{namespace}/api-table/apiGroup/apiVersion/resourceName
    #     - key: child-unique-id
    #       label: "Child Name"
    #       link: /openapi-ui/{2}/{3}/api-table/apiGroup/apiVersion/resourceName
    # URL Templating in labels:
    # Use {n} pattern to insert URL path segments, where n is the segment index (1-based)
    # Example paths:
    # /openapi-ui/cluster-name/namespace/builtin-table/pods
    #   {1} = "openapi-ui", {2} = "cluster-name", {3} = "namespace", etc.
    #   {cluster} = "cluster-name"
    #   {namespace} = "namespace"
    customItems: []

    home:
      enabled: true
      items:
        search: true
        projects: false
        instances: false

    # Workloads within the namespace
    workloads:
      enabled: true
      items:
        pods: true
        deployments: true
        statefulsets: true
        secrets: true
        configmaps: true
        cronjobs: true
        jobs: true
        daemonsets: true
        replicasets: true
        horizontalpodautoscalers: true
        poddisruptionbudgets: true
      extraItems: []

    # Networking within the namespace
    networking:
      enabled: true
      items:
        services: true
        networkpolicies: true
        ingresses: true
      extraItems: []

    # Storage resources within the namespace
    storage:
      enabled: true
      items:
        persistentvolumes: true
        persistentvolumeclaims: true  # Namespace-scoped PVCs
        storageclasses: true
      extraItems: []

    # Compute resources (typically cluster-scoped, but visible in context)
    compute:
      enabled: true
      items:
        nodes: true
      extraItems: []

    # User management within the namespace
    usermanagement:
      enabled: true
      items:
        rolesDiscovery: true  # Show available roles and bindings
        rolesDiscoveryGraph: true  # Show RBAC relationship graph
        serviceaccounts: true  # Namespace-scoped service accounts
        roles: true  # Namespace-scoped roles
        rolebindings: true  # Namespace-scoped role bindings
        clusterroles: true  # Cluster-wide roles (visible in context)
        clusterrolebindings: true  # Cluster-wide bindings (visible in context)
      extraItems: []

    # Administration within the namespace
    administration:
      enabled: true
      items:
        namespaces: true  # Current namespace management
        limitranges: true  # Namespace resource limits
        resourcequotas: true  # Namespace resource quotas
        customresourcedefinitions: true  # CRDs (cluster-wide but visible)
      extraItems: []

  # Additional keysAndTags entries merged into the Sidebar CR alongside keysAndTags.
  # Use this to add bindings for custom or third-party resources without overriding
  # the default set. Same format as keysAndTags below.
  extrakeysAndTags: {}

  # Maps sidebar menu item keys → arrays of route tags used by the UI to:
  #   1. Highlight the active sidebar item based on the current URL
  #   2. Resolve navigation between table views and detail pages
  #
  # Array format for each key:
  #   [0] — K8s API path for the table view (e.g., "apps/v1/deployments")
  #          Used to match the current URL against sidebar items.
  #   [1] — Factory CR name for the detail page (e.g., "deployment-details")
  #          Used to highlight the sidebar item when viewing resource details.
  #   [2+] — Optional plugin route identifiers (e.g., "plugin-rbac/clusterroles")
  #          Used when a plugin provides additional views for this resource type.
  keysAndTags:
    clusterrolebindings:
      - rbac.authorization.k8s.io/v1/clusterrolebindings   # table route
      - clusterrolebinding-details                          # detail factory
    clusterroles:
      - rbac.authorization.k8s.io/v1/clusterroles
      - clusterrole-details
      - plugin-rbac/clusterroles                            # RBAC plugin view
    configmaps:
      - configmaps
      - configmap-details
    cronjobs:
      - batch/v1/cronjobs
      - cronjob-details
    customresourcedefinitions:
      - apiextensions.k8s.io/v1/customresourcedefinitions
      - customresourcedefinition-details
    daemonsets:
      - apps/v1/daemonsets
      - daemonset-details
    deployments:
      - apps/v1/deployments
      - deployment-details
    horizontalpodautoscalers:
      - autoscaling/v2/horizontalpodautoscalers
      - horizontalpodautoscaler-details
    ingresses:
      - networking.k8s.io/v1/ingresses
      - ingresse-details
    jobs:
      - batch/v1/jobs
      - job-details
    limitranges:
      - limitranges
      - limitrange-details
    namespaces:
      - namespaces
      - namespace-details
    networkpolicies:
      - networking.k8s.io/v1/networkpolicies
      - networkpolicy-details
    nodes:
      - nodes
      - node-details
    persistentvolumeclaims:
      - persistentvolumeclaims
      - persistentvolumeclaim-details
    persistentvolumes:
      - persistentvolumes
      - persistentvolume-details
    poddisruptionbudgets:
      - policy/v1/poddisruptionbudgets
      - poddisruptionbudget-details
    pods:
      - pods
      - pod-details
    replicasets:
      - apps/v1/replicasets
      - replicaset-details
    resourcequotas:
      - resourcequotas
      - resourcequota-details
    rolebindings:
      - rbac.authorization.k8s.io/v1/rolebindings
      - rolebinding-details
    roles:
      - rbac.authorization.k8s.io/v1/roles
      - role-details
      - plugin-rbac/roles                                   # RBAC plugin view
    rolesdiscovery:
      - plugin-rbac/table                                   # plugin-only (no K8s resource)
    rolesdiscoverygraph:
      - plugin-rbac/rbac                                    # plugin-only RBAC graph view

    secrets:
      - secrets
      - secret-details
    serviceaccounts:
      - serviceaccounts
      - serviceaccount-details
    services:
      - services
      - service-details
    statefulsets:
      - apps/v1/statefulsets
      - statefulset-details
    storageclasses:
      - storage.k8s.io/v1/storageclasses
      - storageclass-details

# --- Monitoring ------------------------------------------------------------
# Configuration for the monitoring tab rendered on Factory detail pages
# (e.g., Pod details, Node details) when enableMonitoringTab is true.
# The UI embeds Grafana dashboards via iframe using these settings.
monitoring:
  # PromQL API base URL used for metric queries in UI components
  promqlUrl: https://demo.in-cloud.io/monitoring/api/v1/
  # Grafana datasource UID passed as a query parameter to embedded dashboards
  grafanaDatasource: P4169E866C3094E38
  # Base URL of the Grafana instance for iframe embedding
  grafanaBaseUrl: https://grafana.in-cloud.io
  # Dashboard paths (uid/slug) appended to grafanaBaseUrl for specific detail pages
  grafanaDashboardPaths:
    podDetails: k8s_views_pods/kubernetes-views-pods      # dashboard for Pod detail monitoring tab
    nodeDetails: k8s_views_nodes/kubernetes-views-nodes    # dashboard for Node detail monitoring tab
