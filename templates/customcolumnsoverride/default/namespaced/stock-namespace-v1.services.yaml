{{- $customWebResources := default (dict) .Values.customWebResources -}}
{{- $customCcoResources := default (dict) $customWebResources.customcolumnsoverride -}}
{{- $customCco := index $customCcoResources "stock-namespace-v1.services" -}}
{{- if eq (include "in-cloud.web.cco.isEnabled" (dict "config" $customCco)) "true" }}
---
# ============================================================================
# CustomColumnsOverride: stock-namespace-v1.services
# ----------------------------------------------------------------------------
# Table columns for Service (namespaced).
# Toggled via: customWebResources.customcolumnsoverride["stock-namespace-v1.services"]
# ============================================================================
apiVersion: front.in-cloud.io/v1alpha1
kind: CustomColumnsOverride
metadata:
  # Name of this CustomColumnsOverride resource
  name: stock-namespace-v1.services
spec:
  # Table columns rendered in the resource list
  additionalPrinterColumns:
    # =================================================
    # Column: Name
    # =================================================
    - name: Name
      type: factory
      {{ include "in-cloud.web.cco.props.badgeLink" (list $
          "/openapi-ui/{2}/{reqsJsonPath[0]['.metadata.namespace']['-']}/factory/service-details/v1/services/{reqsJsonPath[0]['.metadata.name']['-']}"
        ) | nindent 6
      }}
    # =================================================
    # Column: ClusterIP
    # =================================================
    - name: ClusterIP
      type: factory
      {{ include "in-cloud.web.cco.props.text" (dict
          "jsonPath" ".spec.clusterIP"
          "value" "{reqsJsonPath[0]['.spec.clusterIP']['-']}"
        ) | nindent 6
      }}
    # =================================================
    # Column: LoadbalancerIP
    # =================================================
    - name: LoadbalancerIP
      type: factory
      {{ include "in-cloud.web.cco.props.text" (dict
          "jsonPath" ".status.loadBalancer.ingress[0].ip"
          "value" "{reqsJsonPath[0]['.status.loadBalancer.ingress[0].ip']['-']}"
        ) | nindent 6
      }}
    # =================================================
    # Column: Labels
    # =================================================
    - name: Labels
      type: factory
      {{ include "in-cloud.web.cco.props.labelsEditor" (dict
          "endpoint" "/api/clusters/{2}/k8s/api/v1/namespaces/{3}/services/{6}"
          "linkPrefix" "/openapi-ui/{2}/{3}/search?kinds=~v1~services&labels="
        ) | nindent 6
      }}
    # =================================================
    # Column: Pod Selector
    # =================================================
    - name: Pod Selector
      type: factory
      {{ include "in-cloud.web.cco.props.podSelector" (dict
          "jsonPath" ".spec.selector"
          "linkPrefix" "/openapi-ui/{2}/search?kinds=~v1~pods"
        ) | nindent 6
      }}
    # =================================================
    # Column: Created
    # =================================================
    - name: Created
      type: factory
      {{ include "in-cloud.web.cco.props.created" . | nindent 6 }}
    # =================================================
    # Column: Actions
    # =================================================
    - name: Actions
      type: factory
      {{ include "in-cloud.web.cco.props.actions.namespacedBuiltin" (dict "apiVersion" "v1" "plural" "services") | nindent 6 }}

  # Trim long values for selected columns
  additionalPrinterColumnsTrimLengths:
    {{ include "incloud-web-resources.cco.columns-trim-lengths.name" . | nindent 4 }}
    {{ include "incloud-web-resources.cco.columns-trim-lengths.labels" . | nindent 4 }}
    {{ include "incloud-web-resources.cco.columns-trim-lengths.pod-selector" . | nindent 4 }}

  # Fallback values for empty or missing fields
  additionalPrinterColumnsUndefinedValues:
    {{ include "incloud-web-resources.cco.columns-undefined-values.cluster-ip" . | nindent 4 }}
    {{ include "incloud-web-resources.cco.columns-undefined-values.loadbalancer-ip" . | nindent 4 }}
    {{ include "incloud-web-resources.cco.columns-undefined-values.labels" . | nindent 4 }}
    {{ include "incloud-web-resources.cco.columns-undefined-values.pod-selector" . | nindent 4 }}

  # Tooltips for standard columns
  additionalPrinterColumnsTooltips:
    {{ include "incloud-web-resources.cco.columns-tooltips.name" . | nindent 4 }}
    {{ include "incloud-web-resources.cco.columns-tooltips.created" . | nindent 4 }}

  # Stable identifier used by frontend mapping
  id: stock-namespace-/v1/services
{{- end -}}
