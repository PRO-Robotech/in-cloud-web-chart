{{- $customWebResources := default (dict) .Values.customWebResources -}}
{{- $customCcoResources := default (dict) $customWebResources.customcolumnsoverride -}}
{{- $customCco := index $customCcoResources "stock-namespace-apps.v1.daemonsets" -}}
{{- if eq (include "in-cloud.web.cco.isEnabled" (dict "config" $customCco)) "true" }}
---
# ============================================================================
# CustomColumnsOverride: stock-namespace-apps.v1.daemonsets
# ----------------------------------------------------------------------------
# Table columns for DaemonSet (namespaced).
# Toggled via: customWebResources.customcolumnsoverride["stock-namespace-apps.v1.daemonsets"]
# ============================================================================
apiVersion: front.in-cloud.io/v1alpha1
kind: CustomColumnsOverride
metadata:
  # Name of this CustomColumnsOverride resource
  name: stock-namespace-apps.v1.daemonsets
spec:
  # Table columns rendered in the resource list
  additionalPrinterColumns:
    # =================================================
    # Column: Name
    # =================================================
    - name: Name
      type: factory
      # Clickable name badge → factory detail route (uses row jsonPath placeholders in the URL).
      {{ include "in-cloud.web.cco.props.badgeLink" (list $
          "/openapi-ui/{2}/{reqsJsonPath[0]['.metadata.namespace']['-']}/factory/daemonset-details/apps/v1/daemonsets/{reqsJsonPath[0]['.metadata.name']['-']}"
        ) | nindent 6
      }}
    # =================================================
    # Column: Labels
    # =================================================
    - name: Labels
      type: factory
      # Label editor + deep link to namespace search pre-filtered by kind/labels.
      {{ include "in-cloud.web.cco.props.labelsEditor" (dict
          "endpoint" "/api/clusters/{2}/k8s/apis/apps/v1/namespaces/{3}/daemonsets/{6}"
          "linkPrefix" "/openapi-ui/{2}/{3}/search?kinds=apps~v1~daemonsets&labels="
        ) | nindent 6
      }}
    # =================================================
    # Column: Pod Selector
    # =================================================
    - name: Pod Selector
      type: factory
      # Template labels shown as chips; links resolve to Pod list search for this selector.
      {{ include "in-cloud.web.cco.props.podSelector" (dict
          "jsonPath" ".spec.template.metadata.labels"
          "linkPrefix" "/openapi-ui/{2}/{3}/search?kinds=~v1~pods"
        ) | nindent 6
      }}
    # =================================================
    # Column: Created
    # =================================================
    - name: Created
      type: factory
      # Relative creation timestamp from metadata.
      {{ include "in-cloud.web.cco.props.created" . | nindent 6 }}
    # =================================================
    # Column: Actions
    # =================================================
    - name: Actions
      type: factory
      # Resource-specific row actions (menus/links generated by the daemonset actions helper).
      {{ include "in-cloud.web.cco.props.actions.daemonset" . | nindent 6 }}

  # Trim long values for selected columns
  additionalPrinterColumnsTrimLengths:
    # Shared max display widths per logical column (name, labels, …).
    {{ include "incloud-web-resources.cco.columns-trim-lengths.name" . | nindent 4 }}
    {{ include "incloud-web-resources.cco.columns-trim-lengths.labels" . | nindent 4 }}
    {{ include "incloud-web-resources.cco.columns-trim-lengths.pod-selector" . | nindent 4 }}

  # Fallback values for empty or missing fields
  additionalPrinterColumnsUndefinedValues:
    {{ include "incloud-web-resources.cco.columns-undefined-values.labels" . | nindent 4 }}
    {{ include "incloud-web-resources.cco.columns-undefined-values.pod-selector" . | nindent 4 }}

  # Tooltips for standard columns
  additionalPrinterColumnsTooltips:
    {{ include "incloud-web-resources.cco.columns-tooltips.name" . | nindent 4 }}
    {{ include "incloud-web-resources.cco.columns-tooltips.created" . | nindent 4 }}

  # Stable identifier used by frontend mapping
  id: stock-namespace-/apps/v1/daemonsets
{{- end -}}
