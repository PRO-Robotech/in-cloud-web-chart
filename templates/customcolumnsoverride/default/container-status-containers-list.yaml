{{- $customWebResources := default (dict) .Values.customWebResources -}}
{{- $customCcoResources := default (dict) $customWebResources.customcolumnsoverride -}}
{{- $customCco := index $customCcoResources "container-status-containers-list" -}}
{{- if eq (include "in-cloud.web.cco.isEnabled" (dict "config" $customCco)) "true" }}
---
# =================================================
# CustomColumnsOverride definition
# =================================================
apiVersion: front.in-cloud.io/v1alpha1
kind: CustomColumnsOverride
metadata:
  # Name of this CustomColumnsOverride resource
  name: container-status-containers-list
spec:
  # Table columns rendered in the resource list
  additionalPrinterColumns:
    # =================================================
    # Column: Name
    # =================================================
    - name: Name
      type: factory
      jsonPath: .name
      customProps:
        disableEventBubbling: true
        items:
          - type: antdFlex
            data:
              id: container-name-with-badge
              align: center
              direction: row
              gap: 6
            children:
              - type: ResourceBadge
                data:
                  id: container-name-badge
                  value: "Container"
              - type: parsedText
                data:
                  id: container-name-text
                  text: "{reqsJsonPath[0]['.name']['-']}"
    # =================================================
    # Column: Image
    # =================================================
    - name: Image
      type: string
      jsonPath: .imageID
    # =================================================
    # Column: Memory
    # =================================================
    - name: Memory
      type: factory
      {{ include "in-cloud.web.cco.props.memory" (dict
          "value" "{reqsJsonPath[0]['.additionalReqsData.0.items[*].containers[?(@.name==\"{reqsJsonPath[0][\".name\"]}\")].usage.memory']['-']}"
        ) | nindent 6
      }}
    # =================================================
    # Column: CPU
    # =================================================
    - name: CPU
      type: factory
      {{ include "in-cloud.web.cco.props.cpu" (dict
          "value" "{reqsJsonPath[0]['.additionalReqsData.0.items[*].containers[?(@.name==\"{reqsJsonPath[0][\".name\"]}\")].usage.cpu']['-']}"
        ) | nindent 6
      }}
    # =================================================
    # Column: Started
    # =================================================
    - name: Started
      type: bool
      jsonPath: .started
    # =================================================
    # Column: Ready
    # =================================================
    - name: Ready
      type: bool
      jsonPath: .ready
    # =================================================
    # Column: RestartCount
    # =================================================
    - name: RestartCount
      type: string
      jsonPath: .restartCount
    # =================================================
    # Column: WaitingdReason
    # =================================================
    - name: WaitingdReason
      type: string
      jsonPath: .state.waiting.reason
    # =================================================
    # Column: TerminatedReason
    # =================================================
    - name: TerminatedReason
      type: string
      jsonPath: .state.terminated.reason

  # Sorters and filters for computed resource metrics
  additionalPrinterColumnsCustomSortersAndFilters:
    {{ include "incloud-web-resources.cco.columns-custom-sorters-and-filters.memory" . | nindent 4 }}
    {{ include "incloud-web-resources.cco.columns-custom-sorters-and-filters.cpu" . | nindent 4 }}

  # Trim long values for selected columns
  additionalPrinterColumnsTrimLengths:
    {{ include "incloud-web-resources.cco.columns-trim-lengths.name" . | nindent 4 }}
    {{ include "incloud-web-resources.cco.columns-trim-lengths.container-image" . | nindent 4 }}

  # Fallback values for empty or missing fields
  additionalPrinterColumnsUndefinedValues:
    - key: TerminatedReason
      value: "-"
    - key: WaitingdReason
      value: "-"

  # Tooltips for standard columns
  additionalPrinterColumnsTooltips:
    {{ include "incloud-web-resources.cco.columns-tooltips.name" . | nindent 4 }}
    {{ include "incloud-web-resources.cco.columns-tooltips.created" . | nindent 4 }}

  # Stable identifier used by frontend mapping
  id: container-status-containers-list
{{- end -}}
