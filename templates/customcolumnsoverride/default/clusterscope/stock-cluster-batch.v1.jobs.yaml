{{- $customWebResources := default (dict) .Values.customWebResources -}}
{{- $customCcoResources := default (dict) $customWebResources.customcolumnsoverride -}}
{{- $customCco := index $customCcoResources "stock-cluster-batch.v1.jobs" -}}
{{- if eq (include "in-cloud.web.cco.isEnabled" (dict "config" $customCco)) "true" }}
---
# ============================================================================
# CustomColumnsOverride: stock-cluster-batch.v1.jobs
# ----------------------------------------------------------------------------
# Table columns for Job (cluster-scoped).
# Toggled via: customWebResources.customcolumnsoverride["stock-cluster-batch.v1.jobs"]
# ============================================================================
apiVersion: front.in-cloud.io/v1alpha1
kind: CustomColumnsOverride
metadata:
  # Name of this CustomColumnsOverride resource
  name: stock-cluster-batch.v1.jobs
spec:
  # Table columns rendered in the resource list
  additionalPrinterColumns:
    # =================================================
    # Column: Name
    # =================================================
    - name: Name
      type: factory
      {{ include "in-cloud.web.cco.props.badgeLink" (list $
          "/openapi-ui/{2}/{reqsJsonPath[0]['.metadata.namespace']['-']}/factory/job-details/batch/v1/jobs/{reqsJsonPath[0]['.metadata.name']['-']}"
        ) | nindent 6
      }}
    # =================================================
    # Column: Namespace
    # =================================================
    - name: Namespace
      type: factory
      {{ include "in-cloud.web.cco.props.namespaceBadgeLink" . | nindent 6 }}
    # =================================================
    # Column: Labels
    # =================================================
    - name: Labels
      type: factory
      {{ include "in-cloud.web.cco.props.labelsEditor" (dict
          "endpoint" "/api/clusters/{2}/k8s/apis/batch/v1/jobs/{6}"
          "linkPrefix" "/openapi-ui/{2}/search?kinds=batch~v1~jobs&labels="
        ) | nindent 6
      }}
    # =================================================
    # Column: Manual selector
    # =================================================
    - name: Manual selector
      type: string
      jsonPath: .spec.manualSelector
    # =================================================
    # Column: Backoff limit
    # =================================================
    - name: Backoff limit
      type: string
      jsonPath: .spec.backoffLimit
    # =================================================
    # Column: Completions
    # =================================================
    - name: Completions
      type: string
      jsonPath: .spec.completions
    # =================================================
    # Column: Parallelism
    # =================================================
    - name: Parallelism
      type: string
      jsonPath: .spec.parallelism
    # =================================================
    # Column: Completion mode
    # =================================================
    - name: Completion mode
      type: string
      jsonPath: .spec.completionMode
    # =================================================
    # Column: Suspend
    # =================================================
    - name: Suspend
      type: string
      jsonPath: .spec.suspend
    # =================================================
    # Column: Status
    # =================================================
    - name: Status
      type: factory
      {{ include "in-cloud.web.cco.props.statusJob" . | nindent 6 }}
    # =================================================
    # Column: Created
    # =================================================
    - name: Created
      type: factory
      {{ include "in-cloud.web.cco.props.created" . | nindent 6 }}
    # =================================================
    # Column: Actions
    # =================================================
    - name: Actions
      type: factory
      {{ include "in-cloud.web.cco.props.actions.job" . | nindent 6 }}

  # Trim long values for selected columns
  additionalPrinterColumnsTrimLengths:
    {{ include "incloud-web-resources.cco.columns-trim-lengths.name" . | nindent 4 }}

  # Fallback values for empty or missing fields
  additionalPrinterColumnsUndefinedValues:
    {{ include "incloud-web-resources.cco.columns-undefined-values.namespace" . | nindent 4 }}
    {{ include "incloud-web-resources.cco.columns-undefined-values.starting-deadline-seconds" . | nindent 4 }}

  # Tooltips for standard columns
  additionalPrinterColumnsTooltips:
    {{ include "incloud-web-resources.cco.columns-tooltips.name" . | nindent 4 }}
    {{ include "incloud-web-resources.cco.columns-tooltips.created" . | nindent 4 }}

  # Stable identifier used by frontend mapping
  id: stock-cluster-/batch/v1/jobs
{{- end -}}
