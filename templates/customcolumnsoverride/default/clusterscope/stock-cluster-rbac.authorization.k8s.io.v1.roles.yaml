{{- $customWebResources := default (dict) .Values.customWebResources -}}
{{- $customCcoResources := default (dict) $customWebResources.customcolumnsoverride -}}
{{- $customCco := index $customCcoResources "stock-cluster-rbac.authorization.k8s.io.v1.roles" -}}
{{- if eq (include "in-cloud.web.cco.isEnabled" (dict "config" $customCco)) "true" }}
---
# ============================================================================
# CustomColumnsOverride: stock-cluster-rbac.authorization.k8s.io.v1.roles
# ----------------------------------------------------------------------------
# Table columns for Role (cluster-scoped).
# Toggled via:
# customWebResources.customcolumnsoverride["stock-cluster-rbac.authorization.k8s.io.v1.roles"]
# ============================================================================
apiVersion: front.in-cloud.io/v1alpha1
kind: CustomColumnsOverride
metadata:
  # Name of this CustomColumnsOverride resource
  name: stock-cluster-rbac.authorization.k8s.io.v1.roles
spec:
  # Table columns rendered in the resource list
  additionalPrinterColumns:
    # =================================================
    # Column: Name
    # =================================================
    - name: Name
      type: factory
      {{ include "in-cloud.web.cco.props.badgeLink" (list $
          (ternary
            "/openapi-ui/default/plugins/plugin-rbac/roles/{reqsJsonPath[0]['.metadata.namespace']['-']}/{reqsJsonPath[0]['.metadata.name']['-']}#details"
            "/openapi-ui/{2}/{reqsJsonPath[0]['.metadata.namespace']['-']}/factory/role-details/rbac.authorization.k8s.io/v1/roles/{reqsJsonPath[0]['.metadata.name']['-']}"
            $.Values.moduleRbac.enabled
          )
        ) | nindent 6
      }}
    # =================================================
    # Column: Namespace
    # =================================================
    - name: Namespace
      type: factory
      {{ include "in-cloud.web.cco.props.namespaceBadgeLink" . | nindent 6 }}
    # =================================================
    # Column: Created
    # =================================================
    - name: Created
      type: factory
      {{ include "in-cloud.web.cco.props.created" . | nindent 6 }}
    # =================================================
    # Column: Actions
    # =================================================
    - name: Actions
      type: factory
      {{ include "in-cloud.web.cco.props.actions.namespacedApi" (dict "apiGroup" "rbac.authorization.k8s.io" "apiVersion" "v1" "plural" "roles") | nindent 6 }}

  # Trim long values for selected columns
  additionalPrinterColumnsTrimLengths:
    {{ include "incloud-web-resources.cco.columns-trim-lengths.name" . | nindent 4 }}
    {{ include "incloud-web-resources.cco.columns-trim-lengths.namespace" . | nindent 4 }}

  # Tooltips for standard columns
  additionalPrinterColumnsTooltips:
    {{ include "incloud-web-resources.cco.columns-tooltips.name" . | nindent 4 }}
    {{ include "incloud-web-resources.cco.columns-tooltips.created" . | nindent 4 }}

  # Stable identifier used by frontend mapping
  id: stock-cluster-/rbac.authorization.k8s.io/v1/roles
{{- end -}}
