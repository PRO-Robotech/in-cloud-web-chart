{{- $customWebResources := default (dict) .Values.customWebResources -}}
{{- $customCcoResources := default (dict) $customWebResources.customcolumnsoverride -}}
{{- $customCco := index $customCcoResources "stock-cluster-apiextensions.k8s.io.v1.customresourcedefinitions" -}}
{{- if eq (include "in-cloud.web.cco.isEnabled" (dict "config" $customCco)) "true" }}
---
# ============================================================================
# CustomColumnsOverride: stock-cluster-apiextensions.k8s.io.v1.customresourcedefinitions
# ----------------------------------------------------------------------------
# Table columns for CustomResourceDefinition (cluster-scoped).
# Toggled via:
# customWebResources.customcolumnsoverride["stock-cluster-
# apiextensions.k8s.io.v1.customresourcedefinitions"]
# ============================================================================
apiVersion: front.in-cloud.io/v1alpha1
kind: CustomColumnsOverride
metadata:
  # Name of this CustomColumnsOverride resource
  name: stock-cluster-apiextensions.k8s.io.v1.customresourcedefinitions
spec:
  # Table columns rendered in the resource list
  additionalPrinterColumns:
    # =================================================
    # Column: Name
    # =================================================
    - name: Name
      type: factory
      # badgeLink: clickable name with badge → CRD detail (factory) URL
      {{ include "in-cloud.web.cco.props.badgeLink" (list $
          "/openapi-ui/{2}/factory/crd-details/apiextensions.k8s.io/v1/customresourcedefinitions/{reqsJsonPath[0]['.metadata.name']['-']}"
        ) | nindent 6
      }}
    # =================================================
    # Column: Group
    # =================================================
    - name: Group
      type: string
      jsonPath: .spec.group
    # =================================================
    # Column: Latest Version
    # =================================================
    - name: Latest Version
      type: string
      jsonPath: .status.storedVersions[0]
    # =================================================
    # Column: Namespaced
    # =================================================
    - name: Namespaced
      type: string
      jsonPath: .status.conditions[?(@.type=='NamesAccepted')].status
    # =================================================
    # Column: Established
    # =================================================
    - name: Established
      type: string
      jsonPath: .status.conditions[?(@.type=='Established')].status
    # =================================================
    # Column: Actions
    # =================================================
    - name: Actions
      type: factory
      # actions.clusterScopedApi: row action menu for this cluster-scoped API resource
      {{ include "in-cloud.web.cco.props.actions.clusterScopedApi" (dict "apiGroup" "apiextensions.k8s.io" "apiVersion" "v1" "plural" "customresourcedefinitions") | nindent 6 }}

  # Trim long values for selected columns
  additionalPrinterColumnsTrimLengths:
    # columns-trim-lengths.name: max display length for the Name column (shared trim helper).
    {{ include "incloud-web-resources.cco.columns-trim-lengths.name" . | nindent 4 }}

  # Tooltips for standard columns
  additionalPrinterColumnsTooltips:
    # columns-tooltips.name: tooltip for the Name column header.
    {{ include "incloud-web-resources.cco.columns-tooltips.name" . | nindent 4 }}
    # columns-tooltips.created: tooltip for the Created column header.
    {{ include "incloud-web-resources.cco.columns-tooltips.created" . | nindent 4 }}

  # Stable identifier used by frontend mapping
  id: stock-cluster-/apiextensions.k8s.io/v1/customresourcedefinitions
{{- end -}}
