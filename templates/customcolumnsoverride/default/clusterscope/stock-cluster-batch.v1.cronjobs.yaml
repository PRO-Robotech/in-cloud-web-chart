{{- $customWebResources := default (dict) .Values.customWebResources -}}
{{- $customCcoResources := default (dict) $customWebResources.customcolumnsoverride -}}
{{- $customCco := index $customCcoResources "stock-cluster-batch.v1.cronjobs" -}}
{{- if eq (include "in-cloud.web.cco.isEnabled" (dict "config" $customCco)) "true" }}
---
# =================================================
# CustomColumnsOverride definition
# =================================================
apiVersion: front.in-cloud.io/v1alpha1
kind: CustomColumnsOverride
metadata:
  # Name of this CustomColumnsOverride resource
  name: stock-cluster-batch.v1.cronjobs
spec:
  # Table columns rendered in the resource list
  additionalPrinterColumns:
    # =================================================
    # Column: Name
    # =================================================
    - name: Name
      type: factory
      {{ include "in-cloud.web.cco.props.badgeLink" (list $
          "/openapi-ui/{2}/{reqsJsonPath[0]['.metadata.namespace']['-']}/factory/cronjob-details/batch/v1/cronjobs/{reqsJsonPath[0]['.metadata.name']['-']}"
        ) | nindent 6
      }}
    # =================================================
    # Column: Namespace
    # =================================================
    - name: Namespace
      type: factory
      {{ include "in-cloud.web.cco.props.namespaceBadgeLink" . | nindent 6 }}
    # =================================================
    # Column: Labels
    # =================================================
    - name: Labels
      type: factory
      {{ include "in-cloud.web.cco.props.labelsEditor" (dict
          "endpoint" "/api/clusters/{2}/k8s/apis/batch/v1/cronjobs/{6}"
          "linkPrefix" "/openapi-ui/{2}/search?kinds=batch~v1~cronjobs&labels="
        ) | nindent 6
      }}
    # =================================================
    # Column: Schedule
    # =================================================
    - name: Schedule
      type: string
      jsonPath: .spec.schedule
    # =================================================
    # Column: Suspend
    # =================================================
    - name: Suspend
      type: string
      jsonPath: .spec.suspend
    # =================================================
    # Column: Concurrency policy
    # =================================================
    - name: Concurrency policy
      type: string
      jsonPath: .spec.concurrencyPolicy
    # =================================================
    # Column: Starting deadline seconds
    # =================================================
    - name: Starting deadline seconds
      type: string
      jsonPath: .spec.startingDeadlineSeconds
    # =================================================
    # Column: Created
    # =================================================
    - name: Created
      type: factory
      {{ include "in-cloud.web.cco.props.created" . | nindent 6 }}
    # =================================================
    # Column: Actions
    # =================================================
    - name: Actions
      type: factory
      {{ include "in-cloud.web.cco.props.actions.cronjob" . | nindent 6 }}

  # Trim long values for selected columns
  additionalPrinterColumnsTrimLengths:
    {{ include "incloud-web-resources.cco.columns-trim-lengths.name" . | nindent 4 }}

  # Fallback values for empty or missing fields
  additionalPrinterColumnsUndefinedValues:
    {{ include "incloud-web-resources.cco.columns-undefined-values.namespace" . | nindent 4 }}
    {{ include "incloud-web-resources.cco.columns-undefined-values.starting-deadline-seconds" . | nindent 4 }}

  # Tooltips for standard columns
  additionalPrinterColumnsTooltips:
    {{ include "incloud-web-resources.cco.columns-tooltips.name" . | nindent 4 }}
    {{ include "incloud-web-resources.cco.columns-tooltips.created" . | nindent 4 }}

  # Stable identifier used by frontend mapping
  id: stock-cluster-/batch/v1/cronjobs
{{- end -}}
