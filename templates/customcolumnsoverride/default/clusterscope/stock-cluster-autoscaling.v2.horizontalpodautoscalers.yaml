{{- $customWebResources := default (dict) .Values.customWebResources -}}
{{- $customCcoResources := default (dict) $customWebResources.customcolumnsoverride -}}
{{- $customCco := index $customCcoResources "stock-cluster-autoscaling.v2.horizontalpodautoscalers" -}}
{{- if eq (include "in-cloud.web.cco.isEnabled" (dict "config" $customCco)) "true" }}
---
# =================================================
# CustomColumnsOverride definition
# =================================================
apiVersion: front.in-cloud.io/v1alpha1
kind: CustomColumnsOverride
metadata:
  # Name of this CustomColumnsOverride resource
  name: stock-cluster-autoscaling.v2.horizontalpodautoscalers
spec:
  # Table columns rendered in the resource list
  additionalPrinterColumns:
    # =================================================
    # Column: Name
    # =================================================
    - name: Name
      type: factory
      {{ include "in-cloud.web.cco.props.badgeLink" (list $
          "/openapi-ui/{2}/{reqsJsonPath[0]['.metadata.namespace']['-']}/factory/horizontalpodautoscaler-details/autoscaling/v2/horizontalpodautoscalers/{reqsJsonPath[0]['.metadata.name']['-']}"
        ) | nindent 6
      }}
    # =================================================
    # Column: Namespace
    # =================================================
    - name: Namespace
      type: factory
      {{ include "in-cloud.web.cco.props.namespaceBadgeLink" . | nindent 6 }}
    # =================================================
    # Column: Labels
    # =================================================
    - name: Labels
      type: factory
      {{ include "in-cloud.web.cco.props.labelsEditor" (dict
          "endpoint" "/api/clusters/{2}/k8s/apis/autoscaling/v2/horizontalpodautoscalers/{6}"
          "linkPrefix" "/openapi-ui/{2}/search?kinds=autoscaling~v2~horizontalpodautoscalers&labels="
        ) | nindent 6
      }}
    # =================================================
    # Column: Min replicas
    # =================================================
    - name: Min replicas
      type: factory
      {{ include "in-cloud.web.cco.props.text" (dict
          "jsonPath" ".spec.minReplicas"
          "value" "{reqsJsonPath[0]['.spec.minReplicas']['-']}"
        ) | nindent 6
      }}
    # =================================================
    # Column: Max replicas
    # =================================================
    - name: Max replicas
      type: factory
      {{ include "in-cloud.web.cco.props.text" (dict
          "jsonPath" ".spec.maxReplicas"
          "value" "{reqsJsonPath[0]['.spec.maxReplicas']['-']}"
        ) | nindent 6
      }}
    # =================================================
    # Column: Created
    # =================================================
    - name: Created
      type: factory
      {{ include "in-cloud.web.cco.props.created" . | nindent 6 }}
    # =================================================
    # Column: Actions
    # =================================================
    - name: Actions
      type: factory
      {{ include "in-cloud.web.cco.props.actions.namespacedApi" (dict "apiGroup" "autoscaling" "apiVersion" "v2" "plural" "horizontalpodautoscalers") | nindent 6 }}

  # Trim long values for selected columns
  additionalPrinterColumnsTrimLengths:
    {{ include "incloud-web-resources.cco.columns-trim-lengths.name" . | nindent 4 }}
    {{ include "incloud-web-resources.cco.columns-trim-lengths.labels" . | nindent 4 }}

  # Fallback values for empty or missing fields
  additionalPrinterColumnsUndefinedValues:
    {{ include "incloud-web-resources.cco.columns-undefined-values.labels" . | nindent 4 }}
    {{ include "incloud-web-resources.cco.columns-undefined-values.max-replicas" . | nindent 4 }}
    {{ include "incloud-web-resources.cco.columns-undefined-values.min-replicas" . | nindent 4 }}

  # Tooltips for standard columns
  additionalPrinterColumnsTooltips:
    {{ include "incloud-web-resources.cco.columns-tooltips.name" . | nindent 4 }}
    {{ include "incloud-web-resources.cco.columns-tooltips.created" . | nindent 4 }}

  # Stable identifier used by frontend mapping
  id: stock-cluster-/autoscaling/v2/horizontalpodautoscalers
{{- end -}}
