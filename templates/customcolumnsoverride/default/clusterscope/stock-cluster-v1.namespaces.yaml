{{- if (index .Values.defaultWebResources.customcolumnsoverride "stock-cluster-v1_namespaces") }}
---
# ============================================================================
# CustomColumnsOverride: stock-cluster-v1.namespaces
# ----------------------------------------------------------------------------
# Table columns for Namespace (cluster-scoped).
# Toggled via: defaultWebResources.customcolumnsoverride["stock-cluster-v1_namespaces"]
# ============================================================================
apiVersion: front.in-cloud.io/v1alpha1
kind: CustomColumnsOverride
metadata:
  # Name of this CustomColumnsOverride resource
  name: stock-cluster-v1.namespaces
spec:
  # Table columns rendered in the resource list
  additionalPrinterColumns:
    # =================================================
    # Column: Name
    # =================================================
    - name: Name
      type: factory
      {{ include "in-cloud.web.cco.props.badgeLink" (list $
          "/openapi-ui/{2}/factory/namespace-details/v1/namespaces/{reqsJsonPath[0]['.metadata.name']['-']}"
          (dict
          "name" "Name"
          "jsonPath" ".metadata.name"
          "badge" "Namespace"
          "text" "{reqsJsonPath[0]['.metadata.name']['-']}"
          )
        ) | nindent 6
      }}
    # =================================================
    # Column: Status
    # =================================================
    - name: Status
      type: string
      jsonPath: .status.phase
    # =================================================
    # Column: Created
    # =================================================
    - name: Created
      type: factory
      {{ include "in-cloud.web.cco.props.created" . | nindent 6 }}
    # =================================================
    # Column: Actions
    # =================================================
    - name: Actions
      type: factory
      {{ include "in-cloud.web.cco.props.actions.clusterScopedBuiltin" (dict "apiVersion" "v1" "plural" "namespaces") | nindent 6 }}
  # Trim long values for selected columns
  additionalPrinterColumnsTrimLengths:
    {{ include "incloud-web-resources.cco.columns-trim-lengths.name" . | nindent 4 }}

  # Tooltips for standard columns
  additionalPrinterColumnsTooltips:
    {{ include "incloud-web-resources.cco.columns-tooltips.name" . | nindent 4 }}
    {{ include "incloud-web-resources.cco.columns-tooltips.created" . | nindent 4 }}

  # Stable identifier used by frontend mapping
  id: stock-cluster-/v1/namespaces
{{- end -}}
