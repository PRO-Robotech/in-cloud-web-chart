{{- $customWebResources := default (dict) .Values.customWebResources -}}
{{- $customCcoResources := default (dict) $customWebResources.customcolumnsoverride -}}
{{- $customCco := index $customCcoResources "container-metrics" -}}
{{- if eq (include "in-cloud.web.cco.isEnabled" (dict "config" $customCco)) "true" }}
---
# =================================================
# CustomColumnsOverride definition
# =================================================
apiVersion: front.in-cloud.io/v1alpha1
kind: CustomColumnsOverride
metadata:
  # Name of this CustomColumnsOverride resource
  name: container-metrics
spec:
  # Table columns rendered in the resource list
  additionalPrinterColumns:
    # =================================================
    # Column: Name
    # =================================================
    - name: Name
      type: string
      jsonPath: .name
    # =================================================
    # Column: CPU Usage
    # =================================================
    - name: CPU Usage
      type: string
      jsonPath: .usage.cpu
    # =================================================
    # Column: Memory Usage
    # =================================================
    - name: Memory Usage
      type: string
      jsonPath: .usage.memory

  # Fallback values for empty or missing fields
  additionalPrinterColumnsUndefinedValues:
    - key: Name
      value: "-"
    - key: CPU Usage
      value: "-"
    - key: Memory Usage
      value: "-"

  # Stable identifier used by frontend mapping
  id: container-metrics
{{- end -}}
