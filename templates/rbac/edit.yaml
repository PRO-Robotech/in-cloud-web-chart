{{- if .Values.rbac.create }}
---
# ClusterRole granting read-write access to all front.in-cloud.io resources.
# Aggregated into the built-in "edit" ClusterRole via the aggregate-to-edit label,
# so any user with the "edit" role can manage UI CRDs (create/update Sidebar, Factory, etc.).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: front-in-cloud-edit
  labels:
    rbac.authorization.k8s.io/aggregate-to-edit: "true"
rules:
  - apiGroups: ["front.in-cloud.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
{{- end }}
