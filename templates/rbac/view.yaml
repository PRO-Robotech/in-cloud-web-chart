{{- if .Values.rbac.create }}
---
# ClusterRole granting read-only access to all front.in-cloud.io resources.
# Aggregated into the built-in "view" ClusterRole via the aggregate-to-view label,
# so any user with the "view" role can read UI CRDs (needed to render the UI).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: front-in-cloud-view
  labels:
    rbac.authorization.k8s.io/aggregate-to-view: "true"
rules:
  - apiGroups: ["front.in-cloud.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
{{- end }}
