apiVersion: front.in-cloud.io/v1alpha1
kind: Navigation
metadata:
  name: fallback
  # Best practice: keep Helm ownership labels for traceability of cluster-scoped CRs.
  # These resources are cluster-scoped by CRD design, so namespace is intentionally omitted.
  labels:
    {{- include "incloud-web.labels" . | nindent 4 }}
spec:
  projects:
    clear: '{{ include "incloud-web.basePrefixWithSlash" $ }}/{selectedCluster}/builtin-table/pods'
    change: '{{ include "incloud-web.basePrefixWithSlash" $ }}/{selectedCluster}/{value}/builtin-table/pods'
  instances:
    clear: '{{ include "incloud-web.basePrefixWithSlash" $ }}/{selectedCluster}/builtin-table/pods'
    change: '{{ include "incloud-web.basePrefixWithSlash" $ }}/{selectedCluster}/{value}/builtin-table/pods'
  namespaces:
    clear: '{{ include "incloud-web.basePrefixWithSlash" $ }}/{selectedCluster}/builtin-table/pods'
    change: '{{ include "incloud-web.basePrefixWithSlash" $ }}/{selectedCluster}/{value}/builtin-table/pods'
