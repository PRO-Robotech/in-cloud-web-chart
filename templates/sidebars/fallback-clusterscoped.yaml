apiVersion: front.in-cloud.io/v1alpha1
kind: Sidebar
metadata:
  name: fallback-clusterscoped
  # Best practice: keep Helm ownership labels for traceability of cluster-scoped CRs.
  # These resources are cluster-scoped by CRD design, so namespace is intentionally omitted.
  labels:
    {{- include "incloud-web.labels" . | nindent 4 }}
spec:
  id: fallback
  keysAndTags:
    {{- with .Values.sidebars.keysAndTags }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- with .Values.sidebars.extrakeysAndTags }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  menuItems:
    {{- include "incloud-web-chart.sidebar.menu.items.cluster" . | nindent 4 }}
