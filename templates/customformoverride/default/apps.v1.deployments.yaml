# ============================================================================
# CustomFormsOverride: default-apps.v1.deployments
# ----------------------------------------------------------------------------
# Base CFO for Deployment: hides Pod template metadata and operational fields.
# Deployed with the chart; activated when mapped to "default-/apps/v1/deployments".
# Workloads have more hidden paths than ConfigMap/Secret; forceViewMode: Manual.
# ============================================================================
---
apiVersion: front.in-cloud.io/v1alpha1
kind: CustomFormsOverride
metadata:
  name: default-apps.v1.deployments
spec:
  # Edit via raw YAML rather than auto-generated form from the schema.
  forceViewMode: Manual
  # Must match the entry in cfo-mapping.yaml for this GVR.
  customizationId: "default-/apps/v1/deployments"
  hidden:
    {{ include "incloud-web-chart.customformoverride.hidden.metadata.system" . | nindent 4 }}
    {{ include "incloud-web-chart.customformoverride.hidden.metadata.api" . | nindent 4 }}
    {{ include "incloud-web-chart.customformoverride.hidden.status" . | nindent 4 }}
    {{ include "incloud-web-chart.customformoverride.hidden.template.metadata.system" . | nindent 4 }}
  # Empty schema: do not override form fields on top of the API (same as fallback — original
  # resource schema).
  schema: {}
  # merge: merge with the original API OpenAPI schema rather than replacing it.
  strategy: merge
