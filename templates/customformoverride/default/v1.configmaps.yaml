# ============================================================================
# CustomFormsOverride: default-v1.configmaps
# ----------------------------------------------------------------------------
# Base CFO for ConfigMap: hides operational fields and improves `data` entry.
# Deployed with the chart; activated when CFOMapping points to
# "default-/v1/configmaps" (see cfo-mapping.yaml).
# Fewer hidden paths than workloads: no Pod template metadata; there are
# binaryData/immutable fields and a schema override for `data`.
# ============================================================================
---
apiVersion: front.in-cloud.io/v1alpha1
kind: CustomFormsOverride
metadata:
  name: default-v1.configmaps
spec:
  # Must match the key/value in cfo-mapping.yaml: "default-<group>/<version>/<plural>".
  customizationId: "default-/v1/configmaps"
  hidden:
    {{ include "incloud-web-chart.customformoverride.hidden.metadata.system" . | nindent 4 }}
    {{ include "incloud-web-chart.customformoverride.hidden.metadata.api" . | nindent 4 }}
    {{ include "incloud-web-chart.customformoverride.hidden.status" . | nindent 4 }}
    # ConfigMap-specific fields (some not needed in a simple form).
    - - binaryData
    - - immutable
  schema:
    properties:
      data:
        type: object
        additionalProperties:
          # Multiline input for `data` key values (textarea instead of a single line).
          type: multilineString
  # merge: merge with the original API OpenAPI schema rather than replacing it.
  strategy: merge
