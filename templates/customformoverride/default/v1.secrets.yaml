# ============================================================================
# CustomFormsOverride: default-v1.secrets
# ----------------------------------------------------------------------------
# Base CFO for Secret: hides operational fields and improves secret data entry.
# Deployed with the chart; activated when mapped to "default-/v1/secrets".
# Similar to ConfigMap in number of hidden paths (no workload template), but for
# stringData and base64 `data` fields — separate types in schema.
# ============================================================================
---
apiVersion: front.in-cloud.io/v1alpha1
kind: CustomFormsOverride
metadata:
  name: default-v1.secrets
spec:
  # Must match the entry in cfo-mapping.yaml for Secret.
  customizationId: "default-/v1/secrets"
  hidden:
    {{ include "incloud-web-chart.customformoverride.hidden.metadata.system" . | nindent 4 }}
    {{ include "incloud-web-chart.customformoverride.hidden.metadata.api" . | nindent 4 }}
    {{ include "incloud-web-chart.customformoverride.hidden.status" . | nindent 4 }}
    - - stringData
    - - immutable
  schema:
    properties:
      data:
        type: object
        additionalProperties:
          # Multiline input styled for base64 `data` content.
          type: multilineStringBase64

  # merge: merge with the original API OpenAPI schema rather than replacing it.
  strategy: merge
