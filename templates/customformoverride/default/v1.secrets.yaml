---
apiVersion: front.in-cloud.io/v1alpha1
kind: CustomFormsOverride
metadata:
  name: default-v1.secrets
  # Best practice: keep Helm ownership labels for traceability of cluster-scoped CRs.
  # These resources are cluster-scoped by CRD design, so namespace is intentionally omitted.
  labels:
    {{- include "incloud-web.labels" . | nindent 4 }}
spec:
  customizationId: "default-/v1/secrets"
  hidden:
    {{ include "incloud-web-chart.customformoverride.hidden.metadata.system" . | nindent 4 }}
    {{ include "incloud-web-chart.customformoverride.hidden.metadata.api" . | nindent 4 }}
    {{ include "incloud-web-chart.customformoverride.hidden.status" . | nindent 4 }}
    - - stringData
    - - immutable
  schema:
    properties:
      data:
        type: object
        additionalProperties:
          type: multilineStringBase64

  strategy: merge
