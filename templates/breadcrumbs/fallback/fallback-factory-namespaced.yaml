# ============================================================================
# Breadcrumb: fallback-factory-namespaced-api, fallback-factory-namespaced-builtin
# ----------------------------------------------------------------------------
# Factory (detail) in a namespace: api {6}/{7}/{8} + object {9}; builtin {7} + object {8}.
# Replace these fallbacks with custom Breadcrumb CRs if your factory URLs differ.
# ============================================================================
---
apiVersion: front.in-cloud.io/v1alpha1
kind: Breadcrumb
metadata:
  name: fallback-factory-namespaced-api
spec:
  id: "fallback-factory-namespaced-api"
  # Trail: list link → selected object → static "Details" tail.
  breadcrumbItems:
    # group-version: GVR list/table segment and back link; resource-name: instance; details: tail
    # label.
    - key: group-version
      label: "{6}/{7}/{8}"
      link: "/openapi-ui/{cluster}/{namespace}/api-table/{6}/{7}/{8}"
    - key: resource-name
      label: "{9}"
    - key: details
      label: "Details"

---
apiVersion: front.in-cloud.io/v1alpha1
kind: Breadcrumb
metadata:
  name: fallback-factory-namespaced-builtin
spec:
  id: "fallback-factory-namespaced-builtin"
  breadcrumbItems:
    # group-version: built-in table segment + link; resource-name: instance; details: tail label.
    - key: group-version
      label: "{6}/{7}"
      link: "/openapi-ui/{cluster}/{namespace}/builtin-table/{7}"
    - key: resource-name
      label: "{8}"
    - key: details
      label: "Details"

