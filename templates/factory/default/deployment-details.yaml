{{- $customWebResources := default (dict) .Values.customWebResources -}}
{{- $customFactoryResources := default (dict) $customWebResources.factory -}}
{{- $factoryConfig := index $customFactoryResources "deployment-details" -}}
{{- if or (and $factoryConfig $factoryConfig.enabled) (not $factoryConfig) }}
{{/* Shared factory context (resource, permission context, endpoint) */}}
{{- $deploymentCtx := fromYaml (include "in-cloud.web.factoryContext.namespacedApi" .) -}}
{{- $deploymentApiResource := $deploymentCtx.resource -}}
{{- $deploymentPermissionContext := $deploymentCtx.permissionContext -}}
{{- $deploymentEndpoint := $deploymentCtx.endpoint -}}
# ============================================================================
# Factory: deployment-details
# ----------------------------------------------------------------------------
# Detail page for Deployments.
# Toggled via: customWebResources.factory["deployment-details"].enabled (default: true)
# ============================================================================
apiVersion: front.in-cloud.io/v1alpha1
kind: Factory
metadata:
  name: deployment-details

spec:
  key: deployment-details

  # Indexes into urlsToFetch whose responses are available via reqsJsonPath[N] in the component tree
  effectiveReqIndexes:
    - 0

  # =========================
  # Data sources
  # =========================
  urlsToFetch:
    # Fetch selected resource by name from target cluster
    # Primary resource request (from shared factory context)
    {{- include "in-cloud.web.factoryContext.primaryUrlToFetchList" (dict
        "resource" $deploymentApiResource
        "fieldSelector" "metadata.name={9}"
      ) | trim | nindent 4 }}

    # Related pods metrics request (metrics.k8s.io)
    {{- include "in-cloud.web.factoryContext.metricsPodsUrlToFetchList" (dict
        "withNamespace" true
      ) | trim | nindent 4 }}


  # Disable scroll wrapper for main content card
  withScrollableMainContentCard: false

  # =========================
  # Sidebar tags for navigation
  # =========================
  sidebarTags:
    # Used to group resources in sidebar navigation
    - '{6}/{7}/{8}'

  # =========================
  # Page layout
  # =========================
  data:

    # =========================
    # Header row (resource title + actions)
    # =========================
    - type: antdFlex
      data:
        id: header-row
        align: center
        justify: space-between
        style:
          marginBottom: 24px
      children:

        # =========================
        # LEFT SIDE: Resource identity
        # =========================
        - type: antdFlex
          data:
            align: center
            gap: 6
          children:
            {{ include "in-cloud.web.header.left" (dict
                "k8sResourceToFetch" $deploymentApiResource
                "redirectUrl" "/openapi-ui/{2}/{3}/factory/{5}/{6}/{7}/{8}/{chosenEntryValue}"
              ) | nindent 12 
            }}
            # Deployment availability badge
            - type: DefaultDiv
              data:
                id: node-status-badge
                style:
                  display: inline-flex
                  alignItems: center
                  gap: 6px
                  fontSize: 13
                  fontWeight: 500
                  color: "#065f46"
              children:
                # Deployment availability indicator
                {{- include "in-cloud.web.statusText.deploymentAvailability" (dict
                    "itemPath" ".items.0"
                  ) | nindent 16
                }}

        # =========================
        # RIGHT SIDE: Resource actions dropdown
        # =========================
        - type: ActionsDropdown
          data:
            id: resource-actions
            buttonText: Actions
            actions:

              # ---- Edit resource manifest ----
              {{ include "in-cloud.web.action.edit" (dict
                  "k8sResourceToFetch" (merge (dict
                    "name" "{reqsJsonPath[0]['.items.0.metadata.name']['-']}"
                  ) $deploymentApiResource)
                  "permissionContext" $deploymentPermissionContext
                ) | nindent 14
              }}

              # ---- Edit labels ----
              {{ include "in-cloud.web.action.editLabels" (dict
                  "endpoint" $deploymentEndpoint
                  "permissionContext" $deploymentPermissionContext
                ) | nindent 14
              }}

              # ---- Edit annotations ----
              {{ include "in-cloud.web.action.editAnnotations" (dict
                  "endpoint" $deploymentEndpoint
                  "permissionContext" $deploymentPermissionContext
                ) | nindent 14
              }}

              # Pause rollouts (spec.paused=true)
              {{- include "in-cloud.web.action.suspend" (dict
                  "endpoint" $deploymentEndpoint
                  "permissionContext" $deploymentPermissionContext
                ) | nindent 14 
              }}

              # Resume rollouts (spec.paused=false)
              {{- include "in-cloud.web.action.resume" (dict
                  "endpoint" $deploymentEndpoint
                  "permissionContext" $deploymentPermissionContext
                ) | nindent 14 
              }}

              # Change desired replica count via the scale subresource
              {{- include "in-cloud.web.action.scale" (dict
                  "endpoint" (printf "%s/scale" $deploymentEndpoint)
                  "permissionContext" (merge (dict
                    "subresource" "scale"
                  ) $deploymentPermissionContext)
                ) | nindent 14 
              }}

              # Rolling restart of Pods (rollout restart)
              {{- include "in-cloud.web.action.rolloutRestart" (dict
                  "endpoint" $deploymentEndpoint
                  "permissionContext" $deploymentPermissionContext
                ) | nindent 14 
              }}

              # ---- Delete resource ----
              {{ include "in-cloud.web.action.delete" (dict
                  "endpoint" $deploymentEndpoint
                  "redirectTo" "/openapi-ui/{2}/{3}/api-table/{6}/{7}/{8}"
                  "permissionContext" $deploymentPermissionContext
                ) | nindent 14
              }}

    # =========================
    # Tabs root
    # =========================
    - type: antdTabs
      data:
        id: tabs-root
        # Tab selected by default when the page loads
        defaultActiveKey: details
        # Persist the active tab key in the URL hash for bookmarking and refresh
        syncActiveKeyWithHash: true
        # Show "Open in new tab" context action on each tab header
        allowOpenInNewBrowserTab: true
        items:

          # =========================
          # DETAILS TAB
          # =========================
          - key: details
            label: Details
            children:
              - type: antdFlex
                data:
                  id: details-stack
                  vertical: true
                  gap: 24
                children:

                  # ---- Row 1: Resource info + Metadata counters ----
                  {{ include "in-cloud.web.contentCard.resourceInfoAndMetadataRow" (dict
                      "namespaced" true
                      "endpoint" $deploymentEndpoint
                      "permissionContext" $deploymentPermissionContext
                    ) | nindent 18 
                  }}

                  # ---- Row 2: Runtime facts and selectors ----
                  {{ include "in-cloud.web.contentCard.runtimeFactsAndLabelsRow" (dict
                      "runtimeTemplate" "in-cloud.web.contentCard.deploymentRuntimeFacts"
                      "runtimeContext" .
                      "runtimeSpan" 8
                      "labelsSpan" 6
                      "labelsContext" (dict
                        "podJsonPathToLabels" ".items.0.spec.template.metadata.labels"
                        "nodJsonPathToLabels" ".items.0.spec.template.spec.nodeSelector"
                      )
                    ) | nindent 18
                  }}

                  # ---- Init containers ----
                  {{ include "in-cloud.web.contentCard.genericVisibilityInclude" (dict
                      "containerId" "init-containers-container"
                      "value" "{reqsJsonPath[0]['.items.0.spec.template.spec.initContainers']['-']}"
                      "withResetSpacing" true
                      "includeTemplate" "in-cloud.web.contentCard.template.initContainersList"
                      "includeContext" .
                    ) | nindent 18
                  }}

                  # ---- Containers ----
                  {{ include "in-cloud.web.contentCard.genericVisibilityInclude" (dict
                      "containerId" "containers-container"
                      "value" "{reqsJsonPath[0]['.items.0.spec.template.spec.containers']['-']}"
                      "withResetSpacing" true
                      "includeTemplate" "in-cloud.web.contentCard.template.containersList"
                      "includeContext" .
                    ) | nindent 18
                  }}


                  # ---- Volumes ----
                  {{ include "in-cloud.web.contentCard.volumes" (dict
                      "reqIndex" 0
                      "jsonPathToSpec" ".items.0.spec.template.spec"
                      "errorText" "No efficient data in spec"
                    ) | nindent 18
                  }}

                  # ---- Conditions ----
                  {{ include "in-cloud.web.contentCard.conditionsVisibility" (dict
                      "k8sResourceToFetch" $deploymentApiResource
                      "fieldSelector" (dict
                        "metadata.name" "{9}"
                      )
                    ) | nindent 18
                  }}

          # =========================
          # YAML TAB
          # =========================
          - key: yaml
            label: YAML
            children:
              {{ include "in-cloud.web.contentCard.yamlEditor" (dict
                  "isNameSpaced" true
                  "type" "api"
                  "k8sResourceToFetch" $deploymentApiResource
                  "permissionContext" $deploymentPermissionContext
                ) | nindent 14 
              }}

          # =========================
          # PODS TAB
          # =========================
          - key: replica-set
            label: ReplicaSet
            children:
              # Related Pods list
              {{- include "in-cloud.web.contentCard.replicaSetList" (dict
                  "ifNamespaced" true
                  "labelSelectorFull" (dict
                    "reqIndex" 0
                    "pathToLabels" ".items.0.spec.template.metadata.labels"
                  )
                ) | nindent 14 
              }}
          # =========================
          # PODS TAB
          # =========================
          - key: pods
            label: Pods
            children:
              # Related Pods list
              {{- include "in-cloud.web.contentCard.podList" (dict
                  "ifNamespaced" true
                  "labelSelectorFull" (dict
                    "reqIndex" 0
                    "pathToLabels"  ".items.0.spec.template.metadata.labels"
                  )
                ) | nindent 14 
              }}

          # =========================
          # EVENTS TAB
          # =========================
          - key: events
            label: Events
            children:
              # Kubernetes events related to this resource
              {{ include "in-cloud.web.contentCard.events" . | nindent 14 }}

          # =========================
          # AQUA SECURITY TAB (optional)
          # =========================
          # When customWebResources.factory["node-details"].enableConfigReportsAquaTab is true
          {{- if (index .Values.customWebResources.factory "node-details").enableConfigReportsAquaTab }}
          - key: reports
            label: Reports
            children:
              {{- include "in-cloud.web.contentCard.aquaReport" (dict
                  "fetchUrl" "/api/clusters/{2}/k8s/apis/aquasecurity.github.io/v1alpha1/namespaces/{3}/vulnerabilityreports"
                  "pathToItems" ".items[*].report.vulnerabilities"
                  "customizationId" "factory-aquasecurity.github.io.v1alpha1.vulnerabilityreports"
                  "labelSelector" (dict
                    "trivy-operator.resource.name" "{reqsJsonPath[0]['.items.0.metadata.name']['-']}"
                    "trivy-operator.resource.kind" "{reqsJsonPath[0]['.items.0.kind']['-']}"

                  )
                ) | nindent 14
              }}

          - key: config-reports
            label: Config reports
            children:
              {{- include "in-cloud.web.contentCard.aquaReport" (dict
                  "fetchUrl" "/api/clusters/{2}/k8s/apis/aquasecurity.github.io/v1alpha1/namespaces/{3}/configauditreports"
                  "pathToItems" ".items[*].report.checks"
                  "customizationId" "factory-aquasecurity.github.io.v1alpha1.configauditreports"
                  "labelSelector" (dict
                    "trivy-operator.resource.name" "{reqsJsonPath[0]['.items.0.metadata.name']['-']}"
                    "trivy-operator.resource.kind" "{reqsJsonPath[0]['.items.0.kind']['-']}"
                  )
                ) | nindent 14
              }}
          {{- end }}

{{- end }}
