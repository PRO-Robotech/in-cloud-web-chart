{{- $customWebResources := default (dict) .Values.customWebResources -}}
{{- $customFactoryResources := default (dict) $customWebResources.factory -}}
{{- $factoryConfig := index $customFactoryResources "node-details" -}}
{{- if or (and $factoryConfig $factoryConfig.enabled) (not $factoryConfig) }}
{{/* Shared factory context (resource, permission context, endpoint) */}}
{{- $nodeCtx := fromYaml (include "in-cloud.web.factoryContext.clusterScopedBuiltin" .) -}}
{{- $nodeBuiltinResource := $nodeCtx.resource -}}
{{- $nodePermissionContext := $nodeCtx.permissionContext -}}
{{- $nodeEndpoint := $nodeCtx.endpoint -}}
# ============================================================================
# Factory: node-details
# ----------------------------------------------------------------------------
# Detail page for Nodes.
# Toggled via: customWebResources.factory["node-details"].enabled (default: true)
# ============================================================================
apiVersion: front.in-cloud.io/v1alpha1
kind: Factory
metadata:
  name: node-details

spec:
  key: node-details

  # Indexes into urlsToFetch whose responses are available via reqsJsonPath[N] in the component tree
  effectiveReqIndexes:
    - 0

  # =========================
  # Data sources
  # =========================
  urlsToFetch:
    # Fetch selected resource by name from target cluster
    # Primary resource request (from shared factory context)
    {{- include "in-cloud.web.factoryContext.primaryUrlToFetchList" (dict
        "resource" $nodeBuiltinResource
        "fieldSelector" "metadata.name={7}"
      ) | trim | nindent 4 }}

    # Related pods metrics request (metrics.k8s.io)
    {{- include "in-cloud.web.factoryContext.metricsPodsUrlToFetchList" (dict
        "withNamespace" false
      ) | trim | nindent 4 }}

  # Disable scroll wrapper for main content card
  withScrollableMainContentCard: false

  # =========================
  # Sidebar tags for navigation
  # =========================
  sidebarTags:
    # Used to group resources in sidebar navigation
    - "{6}"

  # =========================
  # Page layout
  # =========================
  data:

    # =========================
    # Header row (resource title + actions)
    # =========================
    - type: antdFlex
      data:
        id: header-row
        align: center
        justify: space-between
        style:
          marginBottom: 24px
      children:

        # =========================
        # LEFT SIDE: Resource identity
        # =========================
        - type: antdFlex
          data:
            align: center
            gap: 6
          children:
            {{ include "in-cloud.web.header.left" (dict
                "k8sResourceToFetch" $nodeBuiltinResource
                "redirectUrl" "/openapi-ui/{2}/factory/{4}/{5}/{6}/{chosenEntryValue}"
              ) | nindent 12 
            }}

            # Node availability badge
            - type: DefaultDiv
              data:
                id: node-status-badge
                style:
                  display: inline-flex
                  alignItems: center
                  gap: 6px
                  fontSize: 13
                  fontWeight: 500
                  color: "#065f46"
              children:
                # Node Ready / NotReady / Progressing indicator
                {{- include "in-cloud.web.statusText.nodeAvailability" (dict
                    "itemPath" ".items.0"
                  ) | nindent 16
                }}

        # =========================
        # RIGHT SIDE: Resource actions dropdown
        # =========================
        - type: ActionsDropdown
          data:
            id: resource-actions
            buttonText: Actions
            actions:

              # ---- Edit resource manifest ----
              {{ include "in-cloud.web.action.edit" (dict
                  "k8sResourceToFetch" (merge (dict
                    "name" "{reqsJsonPath[0]['.items.0.metadata.name']['-']}"
                  ) $nodeBuiltinResource)
                  "permissionContext" $nodePermissionContext
                ) | nindent 14
              }}

              # ---- Edit labels ----
              {{ include "in-cloud.web.action.editLabels" (dict
                  "endpoint" $nodeEndpoint
                  "permissionContext" $nodePermissionContext
                ) | nindent 14
              }}

              # ---- Edit annotations ----
              {{ include "in-cloud.web.action.editAnnotations" (dict
                  "endpoint" $nodeEndpoint
                  "permissionContext" $nodePermissionContext
                ) | nindent 14
              }}

              # ---- Edit taints on node ----
              {{ include "in-cloud.web.action.editTaints" (dict
                  "endpoint" $nodeEndpoint
                  "permissionContext" $nodePermissionContext
                ) | nindent 14
              }}

              # ---- Cordon node ----
              {{ include "in-cloud.web.action.cordon" (dict
                  "endpoint" $nodeEndpoint
                  "permissionContext" $nodePermissionContext
                ) | nindent 14
              }}

              # ---- Uncordon node ----
              {{ include "in-cloud.web.action.uncordon" (dict
                  "endpoint" $nodeEndpoint
                  "permissionContext" $nodePermissionContext
                ) | nindent 14
              }}

              # ---- Open kubelet /configz endpoint ----
              {{ include "in-cloud.web.action.openKubeletConfig" (dict
                  "url" (printf "%s/proxy/configz" $nodeEndpoint)
                  "permissionContext" (merge (dict
                    "subresource" "proxy"
                  ) $nodePermissionContext)
                ) | nindent 14
              }}

              # ---- Delete resource ----
              {{ include "in-cloud.web.action.delete" (dict
                  "endpoint" $nodeEndpoint
                  "redirectTo" "/openapi-ui/{2}/builtin-table/{6}"
                  "permissionContext" $nodePermissionContext
                ) | nindent 14
              }}

    # =========================
    # Tabs root
    # =========================
    - type: antdTabs
      data:
        id: tabs-root
        # Tab selected by default when the page loads
        defaultActiveKey: details
        # Persist the active tab key in the URL hash for bookmarking and refresh
        syncActiveKeyWithHash: true
        # Show "Open in new tab" context action on each tab header
        allowOpenInNewBrowserTab: true
        items:

          # =========================
          # DETAILS TAB
          # =========================
          - key: details
            label: Details
            children:
              - type: antdFlex
                data:
                  id: details-stack
                  vertical: true
                  gap: 24
                children:

                  # ---- Row 1: Resource info + Metadata counters ----
                  {{ include "in-cloud.web.contentCard.resourceInfoAndMetadataRow" (dict
                      "namespaced" false
                      "metadataTemplate" "in-cloud.web.contentCard.nodeMetadataCounters"
                      "endpoint" $nodeEndpoint
                      "permissionContext" $nodePermissionContext
                      "fieldSelector" (dict
                        "metadata.name" "{7}"
                      )
                      "k8sResourceToFetch" $nodeBuiltinResource
                    ) | nindent 18
                  }}

                  # ---- Row 2: Runtime facts and selectors ----
                  - type: antdRow
                    data:
                      gutter: [24, 0]
                    children:

                      # Resource runtime details
                      - type: antdCol
                        data:
                          span: 8
                        children:
                          {{ include "in-cloud.web.contentCard.nodeInfo" . | nindent 26 }}

                      # Selectors and labels
                      - type: antdCol
                        data:
                          span: 7
                        children:
                          {{ include "in-cloud.web.contentCard.nodeFacts" . | nindent 26 }}

                      # Resource usage graphs (CPU, Memory, Storage)
                      - type: antdCol
                        data:
                          span: 9
                        children:
                          - type: DefaultDiv
                            data:
                              style:
                                display: grid
                                gridTemplateColumns: repeat(auto-fit, minmax(320px, 1fr))
                                gap: 16px
                            children:
                              # CPU usage graph
                              {{- include "in-cloud.web.usageGraph.node.cpu" (dict "baseUrl" .Values.monitoring.promqlUrl) | nindent 30 }}
                              # Memory usage graph
                              {{- include "in-cloud.web.usageGraph.node.memory" (dict "baseUrl" .Values.monitoring.promqlUrl) | nindent 30 }}
                              # Storage usage graph
                              {{- include "in-cloud.web.usageGraph.node.storage" (dict "baseUrl" .Values.monitoring.promqlUrl) | nindent 30 }}

                  # ---- Row 3: Node conditions (visible only if present) ----
                  {{ include "in-cloud.web.contentCard.conditionsVisibility" (dict
                      "k8sResourceToFetch" $nodeBuiltinResource
                      "fieldSelector" (dict
                        "metadata.name" "{7}"
                      )
                    ) | nindent 18
                  }}

          # =========================
          # YAML TAB
          # =========================
          - key: yaml
            label: YAML
            children:
              # YAML editor for raw Node manifest
              {{ include "in-cloud.web.contentCard.yamlEditor" (dict
                  "isNameSpaced" false
                  "type" "builtin"
                  "k8sResourceToFetch" $nodeBuiltinResource
                  "permissionContext" (pick $nodeBuiltinResource "cluster" "plural")
                ) | nindent 14
              }}

          # =========================
          # PODS TAB
          # =========================
          - key: pods
            label: Pods
            children:
              # Related Pods list
              {{- include "in-cloud.web.contentCard.podList" (dict
                  "fieldSelector" (dict
                    "spec.nodeName" "{reqsJsonPath[0]['.items.0.metadata.name']['-']}"
                  )
                ) | nindent 14 
              }}

          # =========================
          # TERMINAL TAB
          # =========================
          - key: terminal
            label: Terminal
            children:
              # Web terminal attached to this node
              {{- include "in-cloud.web.contentCard.nodeTerminal" . | nindent 14 }}

          # =========================
          # EVENTS TAB
          # =========================
          - key: events
            label: Events
            children:
              # Kubernetes events related to this node
              {{ include "in-cloud.web.contentCard.events" . | nindent 14 }}

          # =========================
          # MONITORING TAB
          # =========================
          - key: monitoring
            label: Monitoring
            children:
              # Embedded Grafana dashboard for node metrics
              {{- include "in-cloud.web.iframe.monitoring.node" (dict
                  "grafanaBaseUrl" .Values.monitoring.grafanaBaseUrl
                  "grafanaDashboardPath"  .Values.monitoring.grafanaDashboardPaths.nodeDetails
                  "grafanaDatasource" .Values.monitoring.grafanaDatasource
                ) | nindent 14
              }}

          # =========================
          # AQUA SECURITY TAB (optional)
          # =========================
          # When customWebResources.factory["node-details"].enableConfigReportsAquaTab is true
          {{- if (index .Values.customWebResources.factory "node-details").enableConfigReportsAquaTab }}
          - key: config-reports
            label: Config reports
            children:
              {{- include "in-cloud.web.contentCard.aquaReport" (dict
                  "fetchUrl" "/api/clusters/{2}/k8s/apis/aquasecurity.github.io/v1alpha1/clusterinfraassessmentreports"
                  "pathToItems" ".items[*].report.checks"
                  "customizationId" "factory-aquasecurity.github.io.v1alpha1.clusterinfraassessmentreports"
                  "labelSelector" (dict
                    "trivy-operator.resource.kind" "{reqsJsonPath[0]['.items.0.kind']['-']}"
                    "trivy-operator.resource.name" "{reqsJsonPath[0]['.items.0.metadata.name']['-']}"
                  )
                ) | nindent 14
              }}
          {{- end }}

{{- end }}
