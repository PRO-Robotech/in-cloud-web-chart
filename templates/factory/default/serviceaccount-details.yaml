{{- $customWebResources := default (dict) .Values.customWebResources -}}
{{- $customFactoryResources := default (dict) $customWebResources.factory -}}
{{- $factoryConfig := index $customFactoryResources "serviceaccount-details" -}}
{{- if or (and $factoryConfig $factoryConfig.enabled) (not $factoryConfig) }}
{{/* Shared factory context (resource, permission context, endpoint) */}}
{{- $serviceaccountCtx := fromYaml (include "in-cloud.web.factoryContext.namespacedBuiltin" .) -}}
{{- $serviceaccountBuiltinResource := $serviceaccountCtx.resource -}}
{{- $serviceaccountPermissionContext := $serviceaccountCtx.permissionContext -}}
{{- $serviceaccountEndpoint := $serviceaccountCtx.endpoint -}}
---
apiVersion: front.in-cloud.io/v1alpha1
kind: Factory
metadata:
  name: serviceaccount-details

spec:
  key: serviceaccount-details

  effectiveReqIndexes:
    - 0


  # =========================
  # Data sources
  # =========================
  urlsToFetch:
    # Primary resource request (from shared factory context)
    {{- include "in-cloud.web.factoryContext.primaryUrlToFetchList" (dict
        "resource" $serviceaccountBuiltinResource
        "fieldSelector" "metadata.name={8}"
      ) | trim | nindent 4 }}

  withScrollableMainContentCard: false

  # =========================
  # Sidebar tags for navigation
  # =========================
  sidebarTags:
    - '{6}/{7}'

  # =========================
  # Page layout
  # =========================
  data:

    # =========================
    # Header row (resource title + actions)
    # =========================
    - type: antdFlex
      data:
        id: header-row
        align: center
        justify: space-between
        style:
          marginBottom: 24px
      children:

        # =========================
        # LEFT SIDE: Resource identity
        # =========================
        - type: antdFlex
          data:
            align: center
            gap: 6
          children:
            {{ include "in-cloud.web.header.left" (dict
                "k8sResourceToFetch" $serviceaccountBuiltinResource
                "redirectUrl" "/openapi-ui/{2}/{3}/factory/{5}/{6}/{7}/{chosenEntryValue}"
              ) | nindent 12 
            }}

        # =========================
        # RIGHT SIDE: Resource actions
        # =========================
        - type: ActionsDropdown
          data:
            id: resource-actions
            buttonText: Actions
            actions:

              # ---- Edit resource ----
              {{ include "in-cloud.web.action.edit" (dict
                  "k8sResourceToFetch" (merge (dict
                    "name" "{reqsJsonPath[0]['.items.0.metadata.name']['-']}"
                  ) $serviceaccountBuiltinResource)
                  "permissionContext" $serviceaccountPermissionContext
                ) | nindent 14 
              }}

              # ---- Edit labels ----
              {{ include "in-cloud.web.action.editLabels" (dict
                  "endpoint" $serviceaccountEndpoint
                  "permissionContext" $serviceaccountPermissionContext
                ) | nindent 14 
              }}

              # ---- Edit annotations ----
              {{ include "in-cloud.web.action.editAnnotations" (dict
                  "endpoint" $serviceaccountEndpoint
                  "permissionContext" $serviceaccountPermissionContext
                ) | nindent 14 
              }}

              # ---- Delete resource ----
              {{ include "in-cloud.web.action.delete" (dict
                  "endpoint" $serviceaccountEndpoint
                  "redirectTo" "/openapi-ui/{2}/{3}/builtin-table/{6}"
                  "permissionContext" $serviceaccountPermissionContext
                ) | nindent 14 
              }}

    # =========================
    # Main content tabs
    # =========================
    - type: antdTabs
      data:
        # Tab selected by default when the page loads
        defaultActiveKey: details
        # Persist the active tab key in the URL hash for bookmarking and refresh
        syncActiveKeyWithHash: true
        # Show "Open in new tab" context action on each tab header
        allowOpenInNewBrowserTab: true
        id: tabs-root
        items:

          # =========================
          # DETAILS TAB
          # =========================
          - key: details
            label: Details
            children:
              - type: antdFlex
                data:
                  id: details-stack
                  vertical: true
                  gap: 24
                children:
                  {{ include "in-cloud.web.contentCard.resourceInfoAndMetadataRow" (dict
                      "namespaced" true
                      "endpoint" $serviceaccountEndpoint
                      "permissionContext" $serviceaccountPermissionContext
                    ) | nindent 18
                  }}

          # =========================
          # YAML TAB
          # =========================
          - key: yaml
            label: YAML
            children:
              {{ include "in-cloud.web.contentCard.yamlEditor" (dict
                  "isNameSpaced" true
                  "type" "builtin"
                  "k8sResourceToFetch" $serviceaccountBuiltinResource
                  "permissionContext" (pick $serviceaccountBuiltinResource "cluster" "namespace" "plural")
                ) | nindent 14 
              }}

          # =========================
          # PODS TAB
          # =========================
          - key: pods
            label: Pods
            children:
              # Related Pods list
              {{- include "in-cloud.web.contentCard.podList" (dict
                  "fieldSelector" (dict
                    "spec.serviceAccountName" "{reqsJsonPath[0]['.items.0.metadata.name']['-']}"
                  )
                ) | nindent 14 
              }}

          # =========================
          # EVENTS TAB
          # =========================
          - key: events
            label: Events
            children:
              {{ include "in-cloud.web.contentCard.events" . | nindent 14 }}


{{ end }}
