{{- $customWebResources := default (dict) .Values.customWebResources -}}
{{- $customFactoryResources := default (dict) $customWebResources.factory -}}
{{- $factoryConfig := index $customFactoryResources "clusterrolebinding-details" -}}
{{- if or (and $factoryConfig $factoryConfig.enabled) (not $factoryConfig) }}
{{/* Shared factory context (resource, permission context, endpoint) */}}
{{- $clusterrolebindingCtx := fromYaml (include "in-cloud.web.factoryContext.clusterScopedApi" .) -}}
{{- $clusterrolebindingApiResource := $clusterrolebindingCtx.resource -}}
{{- $clusterrolebindingPermissionContext := $clusterrolebindingCtx.permissionContext -}}
{{- $clusterrolebindingEndpoint := $clusterrolebindingCtx.endpoint -}}
---
# ============================================================================
# Factory: clusterrolebinding-details
# ----------------------------------------------------------------------------
# Detail page for ClusterRoleBindings.
# Toggled via: customWebResources.factory["clusterrolebinding-details"].enabled (default: true)
# ============================================================================
apiVersion: front.in-cloud.io/v1alpha1
kind: Factory
metadata:
  name: clusterrolebinding-details

spec:
  key: clusterrolebinding-details

  # Indexes into urlsToFetch whose responses are available via reqsJsonPath[N] in the component tree
  effectiveReqIndexes:
    - 0

  # =========================
  # Data sources
  # =========================
  urlsToFetch:
    # Fetch selected API resource by name
    # Primary resource request (from shared factory context)
    {{- include "in-cloud.web.factoryContext.primaryUrlToFetchList" (dict
        "resource" $clusterrolebindingApiResource
        "fieldSelector" "metadata.name={8}"
      ) | trim | nindent 4 }}

  # Disable scroll wrapper for main content card
  withScrollableMainContentCard: false

  # =========================
  # Sidebar tags for navigation
  # =========================
  sidebarTags:
    - '{5}/{6}/{7}'

  # =========================
  # Page layout
  # =========================
  data:

    # =========================
    # Header row (resource title + actions)
    # =========================
    - type: antdFlex
      data:
        id: header-row
        align: center
        justify: space-between
        style:
          marginBottom: 24px
      children:

        # =========================
        # LEFT SIDE: Resource identity
        # =========================
        - type: antdFlex
          data:
            align: center
            gap: 6
          children:
            {{ include "in-cloud.web.header.left" (dict
                "k8sResourceToFetch" $clusterrolebindingApiResource
                "redirectUrl" "/openapi-ui/{2}/factory/{4}/{5}/{6}/{7}/{chosenEntryValue}"
              ) | nindent 12
            }}

        # =========================
        # RIGHT SIDE: Resource actions
        # =========================
        - type: ActionsDropdown
          data:
            id: resource-actions
            buttonText: Actions
            actions:

              # ---- Edit resource ----
              {{ include "in-cloud.web.action.edit" (dict
                  "k8sResourceToFetch" (merge (dict
                    "name" "{reqsJsonPath[0]['.items.0.metadata.name']['-']}"
                  ) $clusterrolebindingApiResource)
                  "permissionContext" $clusterrolebindingPermissionContext
                ) | nindent 14 
              }}

              # ---- Edit labels ----
              {{ include "in-cloud.web.action.editLabels" (dict
                  "endpoint" $clusterrolebindingEndpoint
                  "permissionContext" $clusterrolebindingPermissionContext
                ) | nindent 14 
              }}

              # ---- Edit annotations ----
              {{ include "in-cloud.web.action.editAnnotations" (dict
                  "endpoint" $clusterrolebindingEndpoint
                  "permissionContext" $clusterrolebindingPermissionContext
                ) | nindent 14 
              }}

              # ---- Delete resource ----
              {{ include "in-cloud.web.action.delete" (dict
                  "endpoint" $clusterrolebindingEndpoint
                  "redirectTo" "/openapi-ui/{2}/api-table/{5}/{6}/{7}"
                  "permissionContext" $clusterrolebindingPermissionContext
                ) | nindent 14 
              }}

    # =========================
    # Main content tabs
    # =========================
    - type: antdTabs
      data:
        # Tab selected by default when the page loads
        defaultActiveKey: details
        # Persist the active tab key in the URL hash for bookmarking and refresh
        syncActiveKeyWithHash: true
        # Show "Open in new tab" context action on each tab header
        allowOpenInNewBrowserTab: true
        id: tabs-root
        items:

          # =========================
          # DETAILS TAB
          # =========================
          - key: details
            label: Details
            children:
              - type: antdFlex
                data:
                  id: details-stack
                  vertical: true
                  gap: 24
                children:
                  # ---- Row 1: Resource info + metadata counters ----
                  {{ include "in-cloud.web.contentCard.resourceInfoAndMetadataRow" (dict
                      "namespaced" false
                      "endpoint" $clusterrolebindingEndpoint
                      "permissionContext" $clusterrolebindingPermissionContext
                    ) | nindent 18 }}


          # =========================
          # YAML TAB
          # =========================
          - key: yaml
            label: YAML
            children:
              {{ include "in-cloud.web.contentCard.yamlEditor" (dict
                "isNameSpaced" false
                "type" "api"
                "k8sResourceToFetch" $clusterrolebindingApiResource
                "permissionContext" (pick $clusterrolebindingPermissionContext "cluster" "apiGroup" "plural")
                ) | nindent 14
              }}

{{ end }}
