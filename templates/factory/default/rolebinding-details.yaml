{{- $customWebResources := default (dict) .Values.customWebResources -}}
{{- $customFactoryResources := default (dict) $customWebResources.factory -}}
{{- $factoryConfig := index $customFactoryResources "rolebinding-details" -}}
{{- if or (and $factoryConfig $factoryConfig.enabled) (not $factoryConfig) }}
{{/* Shared factory context (resource, permission context, endpoint) */}}
{{- $rolebindingCtx := fromYaml (include "in-cloud.web.factoryContext.namespacedApi" .) -}}
{{- $rolebindingApiResource := $rolebindingCtx.resource -}}
{{- $rolebindingPermissionContext := $rolebindingCtx.permissionContext -}}
{{- $rolebindingEndpoint := $rolebindingCtx.endpoint -}}
---
apiVersion: front.in-cloud.io/v1alpha1
kind: Factory
metadata:
  name: rolebinding-details

spec:
  key: rolebinding-details

  # =========================
  # Data sources
  # =========================
  urlsToFetch:
    # Primary resource request (from shared factory context)
    {{- include "in-cloud.web.factoryContext.primaryUrlToFetchList" (dict
        "resource" $rolebindingApiResource
        "fieldSelector" "metadata.name={9}"
      ) | trim | nindent 4 }}

  withScrollableMainContentCard: false

  # =========================
  # Sidebar tags for navigation
  # =========================
  sidebarTags:
    - '{6}/{7}/{8}'

  # =========================
  # Page layout
  # =========================
  data:

    # =========================
    # Header row (resource title + actions)
    # =========================
    - type: antdFlex
      data:
        id: header-row
        align: center
        justify: space-between
        style:
          marginBottom: 24px
      children:

        # =========================
        # LEFT SIDE: Resource identity
        # =========================
        - type: antdFlex
          data:
            align: center
            gap: 6
          children:
            {{ include "in-cloud.web.header.left" (dict
                "k8sResourceToFetch" $rolebindingApiResource
                "redirectUrl" "/openapi-ui/{2}/{3}/factory/{5}/{6}/{7}/{8}/{chosenEntryValue}"
              ) | nindent 12 
            }}

        # =========================
        # RIGHT SIDE: Resource actions
        # =========================
        - type: ActionsDropdown
          data:
            id: resource-actions
            buttonText: Actions
            actions:

              # ---- Edit resource ----
              {{ include "in-cloud.web.action.edit" (dict
                  "k8sResourceToFetch" (merge (dict
                    "name" "{reqsJsonPath[0]['.items.0.metadata.name']['-']}"
                  ) $rolebindingApiResource)
                  "permissionContext" $rolebindingPermissionContext
                ) | nindent 14 
              }}

              # ---- Edit labels ----
              {{ include "in-cloud.web.action.editLabels" (dict
                  "endpoint" $rolebindingEndpoint
                  "permissionContext" $rolebindingPermissionContext
                ) | nindent 14 
              }}

              # ---- Edit annotations ----
              {{ include "in-cloud.web.action.editAnnotations" (dict
                  "endpoint" $rolebindingEndpoint
                  "permissionContext" $rolebindingPermissionContext
                ) | nindent 14 
              }}

              # ---- Delete resource ----
              {{ include "in-cloud.web.action.delete" (dict
                  "endpoint" $rolebindingEndpoint
                  "redirectTo" "/openapi-ui/{2}/{3}/api-table/{6}/{7}/{8}"
                  "permissionContext" $rolebindingPermissionContext
                ) | nindent 14 
              }}

    # =========================
    # Main content tabs
    # =========================
    - type: antdTabs
      data:
        defaultActiveKey: details
        id: tabs-root
        items:

          # =========================
          # DETAILS TAB
          # =========================
          - key: details
            label: Details
            children:
              - type: antdFlex
                data:
                  id: details-stack
                  vertical: true
                  gap: 24
                children:
                  {{ include "in-cloud.web.contentCard.resourceInfoAndMetadataRow" (dict
                      "namespaced" true
                      "endpoint" $rolebindingEndpoint
                      "permissionContext" $rolebindingPermissionContext
                    ) | nindent 18 
                  }}


          # =========================
          # YAML TAB
          # =========================
          - key: yaml
            label: YAML
            children:
              {{ include "in-cloud.web.contentCard.yamlEditor" (dict
                  "isNameSpaced" true
                  "type" "api"
                  "k8sResourceToFetch" $rolebindingApiResource
                  "permissionContext" (pick $rolebindingPermissionContext "cluster" "namespace" "apiGroup" "plural")
                ) | nindent 14 
              }}


{{ end }}
