{{- $customWebResources := default (dict) .Values.customWebResources -}}
{{- $customFactoryResources := default (dict) $customWebResources.factory -}}
{{- $networkPolicyFactory := index $customFactoryResources "networkpolicy-details" -}}
{{- if or (and $networkPolicyFactory $networkPolicyFactory.enabled) (not $networkPolicyFactory) }}
{{/* Shared factory context (resource, permission context, endpoint) */}}
{{- $networkPolicyCtx := fromYaml (include "in-cloud.web.factoryContext.namespacedApi" .) -}}
{{- $networkPolicyApiResource := $networkPolicyCtx.resource -}}
{{- $networkPolicyPermissionContext := $networkPolicyCtx.permissionContext -}}
{{- $networkPolicyEndpoint := $networkPolicyCtx.endpoint -}}
---
apiVersion: front.in-cloud.io/v1alpha1
kind: Factory
metadata:
  name: networkpolicy-details

spec:
  key: networkpolicy-details

  # =========================
  # Data sources
  # =========================
  urlsToFetch:
    # Fetch selected resource by name from target cluster
    # Primary resource request (from shared factory context)
    {{- include "in-cloud.web.factoryContext.primaryUrlToFetchList" (dict
        "resource" $networkPolicyApiResource
        "fieldSelector" "metadata.name={9}"
      ) | trim | nindent 4 }}

  # Disable scroll wrapper for main content card
  withScrollableMainContentCard: false

  # =========================
  # Sidebar tags for navigation
  # =========================
  sidebarTags:
    # Used to group resources in sidebar navigation
    - networkpolicy-details
    - '{6}/{7}/{8}'

  # =========================
  # Page layout
  # =========================
  data:

    # =========================
    # Header row (resource title + actions)
    # =========================
    - type: antdFlex
      data:
        id: header-row
        align: center
        justify: space-between
        style:
          marginBottom: 24px
      children:

        # =========================
        # LEFT SIDE: Resource identity
        # =========================
        - type: antdFlex
          data:
            align: center
            gap: 6
          children:
            {{ include "in-cloud.web.header.left" (dict
                "k8sResourceToFetch" $networkPolicyApiResource
                "redirectUrl" "/openapi-ui/{2}/{3}/factory/{5}/{6}/{7}/{8}/{chosenEntryValue}"
              ) | nindent 12
            }}

        # =========================
        # RIGHT SIDE: Resource actions dropdown
        # =========================
        - type: ActionsDropdown
          data:
            id: resource-actions
            buttonText: Actions
            actions:

              # ---- Edit resource manifest ----
              {{ include "in-cloud.web.action.edit" (dict
                  "k8sResourceToFetch" (merge (dict
                    "name" "{reqsJsonPath[0]['.items.0.metadata.name']['-']}"
                  ) $networkPolicyApiResource)
                  "permissionContext" $networkPolicyPermissionContext
                ) | nindent 14
              }}

              # ---- Edit labels ----
              {{ include "in-cloud.web.action.editLabels" (dict
                  "endpoint" $networkPolicyEndpoint
                  "permissionContext" $networkPolicyPermissionContext
                ) | nindent 14
              }}

              # ---- Edit annotations ----
              {{ include "in-cloud.web.action.editAnnotations" (dict
                  "endpoint" $networkPolicyEndpoint
                  "permissionContext" $networkPolicyPermissionContext
                ) | nindent 14
              }}

              # ---- Delete resource ----
              {{ include "in-cloud.web.action.delete" (dict
                  "endpoint" $networkPolicyEndpoint
                  "redirectTo" "/openapi-ui/{2}/{3}/api-table/{6}/{7}/{8}"
                  "permissionContext" $networkPolicyPermissionContext
                ) | nindent 14
              }}

    # =========================
    # Tabs root
    # =========================
    - type: antdTabs
      data:
        id: tabs-root
        defaultActiveKey: details
        items:

          # =========================
          # DETAILS TAB
          # =========================
          - key: details
            label: Details
            children:
              - type: antdFlex
                data:
                  id: details-stack
                  vertical: true
                  gap: 24
                children:

                  # ---- Row 1: Resource info + Metadata counters ----
                  {{ include "in-cloud.web.contentCard.resourceInfoAndMetadataRow" (dict
                      "namespaced" true
                      "endpoint" $networkPolicyEndpoint
                      "permissionContext" $networkPolicyPermissionContext
                    ) | nindent 18
                  }}

                  # ---- Row 2: Runtime facts ----
                  - type: antdRow
                    data:
                      gutter: [24, 24]
                    children:

                      # Resource runtime details
                      - type: antdCol
                        data:
                          span: 24
                        children:
                          {{ include "in-cloud.web.contentCard.networkpolicyRuntimeFacts" . | nindent 26 }}

          # =========================
          # YAML TAB
          # =========================
          - key: yaml
            label: YAML
            children:
              {{ include "in-cloud.web.contentCard.yamlEditor" (dict
                  "isNameSpaced" true
                  "type" "api"
                  "k8sResourceToFetch" $networkPolicyApiResource
                  "permissionContext" (pick $networkPolicyPermissionContext "cluster" "namespace" "apiGroup" "plural")
                ) | nindent 14
              }}

          # =========================
          # PODS TAB
          # =========================
          - key: pods
            label: Pod Selector
            children:
              # Related Pods list
              {{- include "in-cloud.web.contentCard.podList" (dict
                  "ifNamespaced" true
                  "labelSelectorFull" (dict
                    "reqIndex" 0
                    "pathToLabels" ".items.0.spec.podSelector.matchLabels"
                  )
                ) | nindent 14
              }}

          # =========================
          # EVENTS TAB
          # =========================
          - key: events
            label: Events
            children:
              # Kubernetes events related to this resource
              {{ include "in-cloud.web.contentCard.events" . | nindent 14 }}

{{- end }}
