{{/*
  Base detail-page Factory for namespaced built-in API resources (e.g. Pod, Service).
  Enabled via defaultWebResources.factory.default "base-factory-namespaced-builtin".
*/}}
{{ if (index .Values.defaultWebResources.factory.default "base-factory-namespaced-builtin") }}
{{/* Shared factory context (resource, permission context, endpoint) */}}
{{- $namespacedBuiltinCtx := fromYaml (include "in-cloud.web.factoryContext.namespacedBuiltin" .) -}}
{{- $namespacedBuiltinResource := $namespacedBuiltinCtx.resource -}}
{{- $namespacedBuiltinPermissionContext := $namespacedBuiltinCtx.permissionContext -}}
{{- $namespacedBuiltinEndpoint := $namespacedBuiltinCtx.endpoint -}}
---
# ============================================================================
# Factory: base-factory-namespaced-builtin
# ----------------------------------------------------------------------------
# Generic detail page for any namespaced core/v1 (built-in) resource.
# Enabled via: defaultWebResources.factory.default["base-factory-namespaced-builtin"]
# ============================================================================
apiVersion: front.in-cloud.io/v1alpha1
kind: Factory
metadata:
  name: base-factory-namespaced-builtin

spec:
  # Unique factory identifier — matched by Navigation.baseFactoriesMapping
  key: base-factory-namespaced-builtin

  # Indexes into urlsToFetch whose responses are available via reqsJsonPath[N] in the component tree
  effectiveReqIndexes:
    - 0

  # =========================
  # Data sources
  # =========================
  urlsToFetch:
    # Slot 0: primary resource list/get (from shared factory context)
    {{- include "in-cloud.web.factoryContext.primaryUrlToFetchList" (dict
        "resource" $namespacedBuiltinResource
        "fieldSelector" "metadata.name={8}"
      ) | trim | nindent 4 }}

  # false = full-page layout without extra scroll wrapper
  withScrollableMainContentCard: false

  # =========================
  # Sidebar tags for navigation
  # =========================
  # Tags matched against Sidebar.keysAndTags to highlight active sidebar item
  sidebarTags:
    - '{7}'

  # =========================
  # Page layout
  # =========================
  data:

    # =========================
    # Header row (resource title + actions)
    # =========================
    - type: antdFlex
      data:
        id: header-row
        align: center
        justify: space-between
        style:
          marginBottom: 24px
      children:

        # =========================
        # LEFT SIDE: Resource identity
        # =========================
        - type: antdFlex
          data:
            align: center
            gap: 6
          children:
            {{ include "in-cloud.web.header.left" (dict
                "k8sResourceToFetch" $namespacedBuiltinResource
                "redirectUrl" "/openapi-ui/{2}/{3}/factory/{5}/{6}/{7}/{chosenEntryValue}"
              ) | nindent 12 
            }}

        # =========================
        # RIGHT SIDE: Resource actions
        # =========================
        - type: ActionsDropdown
          data:
            id: resource-actions
            buttonText: Actions
            actions:

              # ---- Edit resource ----
              {{ include "in-cloud.web.action.edit" (dict
                  "k8sResourceToFetch" (merge (dict
                    "name" "{reqsJsonPath[0]['.items.0.metadata.name']['-']}"
                  ) $namespacedBuiltinResource)
                  "permissionContext" $namespacedBuiltinPermissionContext
                ) | nindent 14 
              }}

              # ---- Edit labels ----
              {{ include "in-cloud.web.action.editLabels" (dict
                  "endpoint" $namespacedBuiltinEndpoint
                  "permissionContext" $namespacedBuiltinPermissionContext
                ) | nindent 14 
              }}

              # ---- Edit annotations ----
              {{ include "in-cloud.web.action.editAnnotations" (dict
                  "endpoint" $namespacedBuiltinEndpoint
                  "permissionContext" $namespacedBuiltinPermissionContext
                ) | nindent 14 
              }}

              # ---- Delete resource ----
              {{ include "in-cloud.web.action.delete" (dict
                  "endpoint" $namespacedBuiltinEndpoint
                  "redirectTo" "/openapi-ui/{2}/{3}/builtin-table/{6}"
                  "permissionContext" $namespacedBuiltinPermissionContext
                ) | nindent 14 
              }}

    # =========================
    # Main content tabs
    # =========================
    # antdTabs — tabbed main section (Details, YAML, Events)
    - type: antdTabs
      data:
        # Tab selected by default when the page loads
        defaultActiveKey: details
        # Persist the active tab key in the URL hash for bookmarking and refresh
        syncActiveKeyWithHash: true
        # Show "Open in new tab" context action on each tab header
        allowOpenInNewBrowserTab: true
        id: tabs-root
        items:

          # =========================
          # DETAILS TAB
          # =========================
          - key: details
            label: Details
            children:
              # antdFlex — Details tab content stack
              - type: antdFlex
                data:
                  id: details-stack
                  vertical: true
                  gap: 24
                children:
                  {{ include "in-cloud.web.contentCard.resourceInfoAndMetadataRow" (dict
                      "namespaced" true
                      "endpoint" $namespacedBuiltinEndpoint
                      "permissionContext" $namespacedBuiltinPermissionContext
                    ) | nindent 18 
                  }}

                  # ---- Conditions ----
                  {{ include "in-cloud.web.contentCard.conditionsVisibility" (dict
                      "k8sResourceToFetch" $namespacedBuiltinResource
                      "fieldSelector" (dict
                        "metadata.name" "{8}"
                      )
                    ) | nindent 18 
                  }}

          # =========================
          # YAML TAB
          # =========================
          - key: yaml
            label: YAML
            children:
              {{ include "in-cloud.web.contentCard.yamlEditor" (dict
                  "isNameSpaced" true
                  "type" "builtin"
                  "k8sResourceToFetch" $namespacedBuiltinResource
                  "permissionContext" (pick $namespacedBuiltinResource "cluster" "namespace" "plural")
                ) | nindent 14 
              }}

          # =========================
          # EVENTS TAB
          # =========================
          - key: events
            label: Events
            children:
              {{ include "in-cloud.web.contentCard.events" . | nindent 14 }}

{{ end }}
