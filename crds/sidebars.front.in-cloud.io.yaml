                              type: string
                            link:
                              type: string

                            resourcesList:
                              type: object
                              additionalProperties: true
                              required:
                                - cluster
                                - apiVersion
                                - plural
                                - linkToResource
                                - jsonPathToName
                              properties:
                                cluster:
                                  type: string
                                apiGroup:
                                  type: string
                                apiVersion:
                                  type: string
                                plural:
                                  type: string
                                namespace:
                                  type: string
                                linkToResource:
