                          linkToResource:
                            type: string
                          jsonPathToName:
                            type: string
                          linkToResourceList:
                            type: string

                      children:
                        type: array
                        items:
                          type: object
                          additionalProperties: true
                          required:
                            - key
                            - label
                          properties:
                            key:
                              type: string
