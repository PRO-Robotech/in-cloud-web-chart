---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: breadcrumbsinsides.front.in-cloud.io
spec:
  group: front.in-cloud.io
  scope: Cluster
  names:
    plural: breadcrumbsinsides
    singular: breadcrumbsinside
    kind: BreadcrumbInside
    listKind: BreadcrumbInsideList
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          description: >-
            BreadcrumbInside defines a secondary (nested) breadcrumb trail that appears
            within an inner content area — for example inside a tab or a nested detail view.
            It uses the same schema as Breadcrumb, but the UI renders it independently
            when a sub-context is active (e.g., viewing a container inside a Pod detail page).
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              description: Desired inner breadcrumb trail configuration.
              required:
                - id
                - breadcrumbItems
              properties:
                id:
                  type: string
                  description: >-
                    Unique identifier matched by the UI for nested breadcrumb contexts.
                    Same naming convention as Breadcrumb spec.id.
                breadcrumbItems:
                  type: array
                  description: >-
                    Ordered list of inner breadcrumb segments. Same format and placeholder
                    support as Breadcrumb spec.breadcrumbItems ({n}, {cluster}, {namespace}).
                  items:
                    type: object
                    required:
                      - key
                      - label
                    properties:
                      key:
                        type: string
                        description: Unique key for this inner breadcrumb segment.
                      label:
                        type: string
                        description: Display text. Supports URL template placeholders.
                      link:
                        type: string
                        description: Optional navigation URL. Supports template placeholders.
                    additionalProperties: true
              additionalProperties: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: ID
          type: string
          jsonPath: .spec.id
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
