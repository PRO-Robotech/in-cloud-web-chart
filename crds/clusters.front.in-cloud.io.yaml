apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: clusters.front.in-cloud.io
spec:
  group: front.in-cloud.io
  scope: Cluster
  names:
    plural: clusters
    singular: cluster
    kind: Cluster
    listKind: ClusterList
    shortNames:
      - cl
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          description: >-
            Cluster represents a logical Kubernetes cluster registered in the openapi-ui
            application. When CLUSTERLIST_API_RESOURCE_PLURAL is set to "clusters", the UI
            fetches Cluster CRs instead of the static JSON cluster list served by nginx.
            Each Cluster CR provides display metadata (name, version) used in the cluster
            selector and cluster list page.
          required:
            - spec
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              description: >-
                Free-form cluster metadata. Commonly used fields (not enforced by schema):
                  displayName (string) — human-readable cluster label shown in the UI.
                  version (string) — cluster or chart version displayed on the cluster list page.
              x-kubernetes-preserve-unknown-fields: true
